function toStage(clientX, clientY) {
  const pt = new DOMPoint(clientX, clientY);
  const m = stage.getScreenCTM();
  if (!m) return { x: 0, y: 0 };
  const p = pt.matrixTransform(m.inverse());
  return { x: p.x, y: p.y };
}

// requestAnimationFrame tween. fn(t) gets t in [0,1]. Returns cancel().
function tween(ms, fn, done) {
  let cancelled = false;
  const t0 = performance.now();
  function frame(now) {
    if (cancelled) return;
    const t = clamp((now - t0) / ms, 0, 1);
    fn(t);
    if (t < 1) requestAnimationFrame(frame);
    else if (done) done();
  }
  requestAnimationFrame(frame);
  return () => { cancelled = true; };
}

// ============================================================ STATE
const State = {
  muted: false,
  outfit: null,            // filled by dress-up task
  lastCheeredOutfit: null,
  mapSpawn: null,          // where Eya stands when returning to map
};

// ============================================================ AUDIO
// Everything synthesized in WebAudio (no audio files); Taglish phrases via
// on-device speech synthesis. All guarded — silence is always acceptable.
const Audio = (() => {
  let ctx = null, master = null, musicGain = null, musicTimer = null;

  try { State.muted = localStorage.getItem('eya-muted') === '1'; } catch (e) {}

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = State.muted ? 0 : 1;
      master.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.09;
      musicGain.connect(master);
    } catch (e) { ctx = null; }
    return ctx;
  }

  // one short synthesized tone
  function tone({ freq = 440, dur = 0.15, type = 'sine', vol = 0.5, at = 0, slide = 0, out = null }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(out || master);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }

  function noise({ dur = 0.08, vol = 0.5, freq = 800, at = 0 }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start(t0);
  }

  const SFX = {
    knock()   { noise({ dur: 0.09, vol: 0.9, freq: 320 }); noise({ dur: 0.09, vol: 0.9, freq: 300, at: 0.22 }); },
    pop()     { tone({ freq: 500, dur: 0.09, type: 'square', vol: 0.25, slide: 300 }); },
    sparkle() { [1200, 1600, 2100, 2700].forEach((f, i) => tone({ freq: f, dur: 0.12, vol: 0.22, at: i * 0.05 })); },
    boing()   { tone({ freq: 180, dur: 0.28, type: 'triangle', vol: 0.5, slide: 260 }); },
    chime()   { tone({ freq: 880, dur: 0.4, vol: 0.3 }); tone({ freq: 1320, dur: 0.5, vol: 0.2, at: 0.08 }); },
    step()    { noise({ dur: 0.04, vol: 0.25, freq: 700 }); },
    meow()    { tone({ freq: 700, dur: 0.35, type: 'sawtooth', vol: 0.12, slide: -280 }); },
    bounce()  { tone({ freq: 240, dur: 0.14, type: 'triangle', vol: 0.4, slide: -120 }); },
    whee()    { tone({ freq: 400, dur: 0.7, type: 'triangle', vol: 0.35, slide: 900 }); },
    giggle()  { [780, 680, 880, 640].forEach((f, i) => tone({ freq: f, dur: 0.1, type: 'sine', vol: 0.22, at: i * 0.1 })); },
    bell()    { tone({ freq: 660, dur: 0.5, vol: 0.32 }); tone({ freq: 880, dur: 0.6, vol: 0.24, at: 0.14 }); },
    pageflip() { noise({ dur: 0.14, vol: 0.35, freq: 1200 }); },
    coin()    { tone({ freq: 1300, dur: 0.1, vol: 0.28 }); tone({ freq: 1750, dur: 0.14, vol: 0.24, at: 0.07 }); },
    bark()    { tone({ freq: 320, dur: 0.12, type: 'sawtooth', vol: 0.3, slide: -80 }); tone({ freq: 300, dur: 0.12, type: 'sawtooth', vol: 0.28, slide: -70, at: 0.16 }); },
    clap()    { noise({ dur: 0.05, vol: 0.6, freq: 2000 }); },
    munch()   { noise({ dur: 0.06, vol: 0.4, freq: 260 }); noise({ dur: 0.06, vol: 0.38, freq: 220, at: 0.16 }); noise({ dur: 0.06, vol: 0.34, freq: 240, at: 0.32 }); },
    fanfare() {
      [[523, 0], [659, 0.12], [784, 0.24], [1047, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.35, type: 'triangle', vol: 0.35, at }));
      [[523, 0.38], [659, 0.38], [784, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.6, type: 'triangle', vol: 0.2, at }));
    },
  };

  // gentle plucked pentatonic lullaby-ish loop
  const SCALE = [392, 440, 523, 587, 659, 784];
  function scheduleBar() {
    if (!ctx || State.muted) return;
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.75) {
        tone({ freq: pick(SCALE), dur: 0.5, type: 'sine', vol: 0.5, at: i * 0.42, out: musicGain });
      }
      if (i === 0 && Math.random() < 0.5) {
        tone({ freq: pick(SCALE) / 2, dur: 0.9, type: 'triangle', vol: 0.25, at: 0, out: musicGain });
      }
    }
  }

  let voice = null, voiceLoaded = false;
  function pickVoice() {
    if (voiceLoaded) return;
    try {
      const vs = speechSynthesis.getVoices();
      if (!vs.length) return;
      voice = vs.find(v => /^(fil|tl)/i.test(v.lang)) || null;
      voiceLoaded = true;
    } catch (e) {}
  }
  try { speechSynthesis.addEventListener('voiceschanged', pickVoice); } catch (e) {}

  return {
    unlock() {
      const c = ensureCtx();
      try { if (c && c.state === 'suspended') c.resume(); } catch (e) {}
      try { speechSynthesis.resume(); } catch (e) {}
      pickVoice();
    },
    sfx(name) {
      if (State.muted || !ensureCtx()) return;
      try { SFX[name] && SFX[name](); } catch (e) {}
    },
    say(text) {
      if (State.muted) return;
      try {
        pickVoice();
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.pitch = 1.2; u.volume = 1;
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      } catch (e) {}
    },
    music: {
      start() {
        if (musicTimer || !ensureCtx()) return;
        scheduleBar();
        musicTimer = setInterval(scheduleBar, 1700);
      },
      stop() { clearInterval(musicTimer); musicTimer = null; },
    },
    // a gentle 8-note hymn phrase, plays once (safe to retrigger)
    hymn() {
      if (State.muted || !ensureCtx()) return;
      try {
        [523, 659, 784, 880, 784, 659, 587, 523].forEach((f, i) =>
          tone({ freq: f, dur: 0.5, type: 'triangle', vol: 0.24, at: i * 0.5, out: musicGain }));
      } catch (e) {}
    },
    setMuted(b) {
      State.muted = b;
      try { localStorage.setItem('eya-muted', b ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = b ? 0 : 1;
      if (b) { try { speechSynthesis.cancel(); } catch (e) {} }
    },
  };
})();

    <circle cx="1520" cy="80" r="52" fill="#ffffff" opacity="0.85"/>
    <text id="muteIcon" x="1520" y="102" text-anchor="middle" font-size="56">${State.muted ? '🔇' : '🔊'}</text>
  </g>`;
}
function wireMuteButton() {
  const btn = $('#muteBtn');
  if (!btn) return;
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    Audio.setMuted(!State.muted);
    $('#muteIcon').textContent = State.muted ? '🔇' : '🔊';
    if (!State.muted) Audio.sfx('pop');
  });
}

// High-contrast label: bold text with a thick outline so it reads on any background.
function bigLabel(x, y, str, o = {}) {
  const size = o.size || 34;
  return `<text x="${x}" y="${y}" text-anchor="${o.anchor || 'middle'}" font-size="${size}"
    font-weight="${o.weight || 'bold'}" font-family="'Comic Sans MS','Chalkboard SE',cursive"
    fill="${o.fill || '#fff'}" stroke="${o.stroke || '#3a3a42'}" stroke-width="${Math.max(3, size / 5)}"
    paint-order="stroke" stroke-linejoin="round">${str}</text>`;
}

// ============================================================ ART — character rig
// Coordinate system per character: origin at center of feet, head top ≈ y=-330.
// Same face geometry for everyone; female full-hair styles overlay a hair ring
// with a skin "face window" so features sit at identical coordinates.

const FACE = { eyeY: -256, eyeX: 24, mouthY: -230, browY: -278, blushY: -238, blushX: 40 };

function hairBack(spec) {
  const hc = spec.hairColor;
  switch (spec.hair) {
    case 'pigtails':
      return `<circle cx="-80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="-80" cy="-260" r="7" fill="#ffb0c8"/>
              <circle cx="80" cy="-260" r="7" fill="#ffb0c8"/>`;
    case 'longStraight':
      return `<path d="M -70 -270 Q -78 -160 -64 -120 L -30 -130 L -40 -230 L 40 -230 L 30 -130 L 64 -120 Q 78 -160 70 -270 Z" fill="${hc}"/>`;
    case 'longWavy':
      return `<path d="M -70 -270 Q -84 -200 -70 -170 Q -80 -140 -62 -112 L -30 -128 L -40 -230 L 40 -230 L 30 -128 L 62 -112 Q 80 -140 70 -170 Q 84 -200 70 -270 Z" fill="${hc}"/>
              <circle cx="-64" cy="-118" r="14" fill="${hc}"/><circle cx="64" cy="-118" r="14" fill="${hc}"/>`;
    case 'shoulderBob':
      return `<path d="M -72 -270 Q -80 -190 -62 -168 Q -30 -152 0 -152 Q 30 -152 62 -168 Q 80 -190 72 -270 Z" fill="${hc}"/>`;
    case 'ponytail':
      return `<circle cx="62" cy="-300" r="20" fill="${hc}"/>
              <path d="M 62 -300 Q 92 -260 78 -190 Q 70 -168 60 -186 Q 70 -250 52 -290 Z" fill="${hc}"/>
              <circle cx="58" cy="-296" r="7" fill="#e8b13a"/>`;
    default: return '';
  }
}

function hairFront(spec) {
  const hc = spec.hairColor;
  const fullHair = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'].includes(spec.hair);
  if (fullHair) {
    // hair ring + face window (fringe all around)
    return `<circle cx="0" cy="-258" r="71" fill="${hc}"/>
            <ellipse cx="0" cy="-244" rx="54" ry="50" fill="${spec.skin}"/>`;
  }
  switch (spec.hair) {
    case 'shortSpiky':
      return `<path d="M -64 -268 A 66 66 0 0 1 64 -268 L 62 -256 Q 44 -270 40 -262 Q 20 -278 12 -266 Q -6 -280 -16 -266 Q -36 -276 -44 -262 Q -58 -268 -62 -254 Z" fill="${hc}"/>
              <path d="M -50 -308 L -40 -326 L -32 -308 Z" fill="${hc}"/>
              <path d="M -18 -316 L -8 -334 L 0 -314 Z" fill="${hc}"/>
              <path d="M 14 -316 L 24 -332 L 32 -312 Z" fill="${hc}"/>
              <path d="M 42 -306 L 52 -320 L 58 -302 Z" fill="${hc}"/>`;
    case 'shortNeat':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -252 Q 30 -272 -10 -268 Q -46 -264 -64 -248 Z" fill="${hc}"/>`;
    case 'swept':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -240 Q 56 -262 34 -266 Q 54 -280 30 -290 Q -6 -302 -38 -288 Q -62 -276 -64 -246 Z" fill="${hc}"/>
              <path d="M -60 -282 Q -20 -306 24 -294 Q 44 -288 50 -276 Q 20 -290 -16 -284 Q -44 -278 -58 -266 Z" fill="${hc}"/>`;
    default: return '';
  }
}

function drawGlasses(spec) {
  if (!spec.glasses) return '';
  const { eyeX, eyeY } = FACE;
  if (spec.glasses === 'round')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <circle cx="-${eyeX}" cy="${eyeY}" r="19"/><circle cx="${eyeX}" cy="${eyeY}" r="19"/>
      <line x1="-5" y1="${eyeY - 4}" x2="5" y2="${eyeY - 4}"/></g>`;
  if (spec.glasses === 'rect')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <rect x="-${eyeX + 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <rect x="${eyeX - 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}"/></g>`;
  // sun
  return `<g><rect x="-${eyeX + 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <rect x="${eyeX - 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>

}

function drawMouth(spec) {
  const y = FACE.mouthY;
  switch (spec.smile) {

let _faceUid = 0;
const FULL_HAIR = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'];

// Photo face: the real face clipped into the head, cartoon hair around it.
// Full-hair styles: hair ring first, photo fills the face window.
// Short-hair styles: photo first, fringe overlaps the forehead edge.
function photoFaceLayer(spec) {
  const photo = FACES[spec.face];
  const uid = ++_faceUid;
  const full = FULL_HAIR.includes(spec.hair);
  // Short-hair crops already show the person's real hair, so no cartoon fringe:
  // the photo just fills (almost) the whole head circle.
  const e = full ? { cy: -244, rx: 54, ry: 50 } : { cy: -251, rx: 58, ry: 63 };
  const img = `
      <clipPath id="fclip${uid}"><ellipse cx="0" cy="${e.cy}" rx="${e.rx}" ry="${e.ry}"/></clipPath>
      <image href="${photo}" xlink:href="${photo}" x="${-e.rx - 4}" y="${e.cy - e.ry - 4}"
        width="${e.rx * 2 + 8}" height="${e.ry * 2 + 8}"
        preserveAspectRatio="xMidYMid slice" clip-path="url(#fclip${uid})"/>`;
  return full ? hairFront(spec) + img : img;
}

function cartoonFaceLayer(spec) {
  const { eyeX, eyeY, browY, blushX, blushY } = FACE;
  return `
      ${hairFront(spec)}
      <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>

      <path d="M ${eyeX - 12} ${browY} Q ${eyeX} ${browY - 7} ${eyeX + 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      <ellipse cx="${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      ${drawMouth(spec)}
      ${drawGlasses(spec)}`;
}

function buildCharacter(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1, facing = 1, idle = false, cls = '' } = opts;
  const earrings = spec.earrings
    ? `<circle cx="-58" cy="-226" r="5" fill="#f2c94c"/><circle cx="58" cy="-226" r="5" fill="#f2c94c"/>` : '';
  const bob = idle
    ? `<animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>` : '';
  const face = FACES[spec.face] ? photoFaceLayer(spec) : cartoonFaceLayer(spec);
  return `
  <g class="${cls}" transform="translate(${x} ${y}) scale(${scale * facing} ${scale})">
    <g>${bob}
      ${hairBack(spec)}
      <!-- legs -->
      <rect x="-30" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      <rect x="10" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      ${drawShoes(spec)}
      ${drawBottom(spec)}
      ${drawArms(spec)}
      ${drawTop(spec)}
      <!-- neck + head -->
      <rect x="-12" y="-216" width="24" height="26" fill="${spec.skin}"/>
      <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
      ${face}
      ${earrings}
      ${drawHat(spec)}
    </g>
  </g>`;
}

// Head-only portrait for house signboards.
function buildFace(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1 } = opts;

// Wave animation: rotate the right arm up and back a few times.
function waveCharacter(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(1200, t => {
    const a = -70 * Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t * 0.2);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

// Raise and hold the right arm (for a high-five).
function raiseArm(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(900, t => {
    const a = -100 * Math.min(1, t * 3) * (t > 0.7 ? (1 - (t - 0.7) / 0.3) : 1);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

// Little floaters (hearts or stars) rising from a point, drawn into `layer`.
function floaters(layer, x, y, kind) {
  if (!layer) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  layer.appendChild(g);
  const heart = c => `<path d="M 0 8 C -12 -2 -9 -14 -2 -9 Q 0 -7 0 -4 Q 0 -7 2 -9 C 9 -14 12 -2 0 8 Z" fill="${c}"/>`;
  const star = c => `<path d="M 0 -11 L 3 -3 L 11 -3 L 4 2 L 7 10 L 0 5 L -7 10 L -4 2 L -11 -3 L -3 -3 Z" fill="${c}"/>`;
  const cols = kind === 'heart' ? ['#ff8fb5', '#f47a5e', '#ff5a8a'] : ['#ffd94d', '#ffe066', '#f2c94c'];
  const bits = Array.from({ length: 7 }, () => ({
    x: x + rand(-50, 50), y: y + rand(-10, 10),
    vx: rand(-40, 40), vy: rand(-150, -90), s: rand(1.4, 2.6), c: pick(cols), rot: rand(-30, 30),
  }));
  tween(1200, t => {
    g.innerHTML = bits.map(b => `<g transform="translate(${b.x + b.vx * t} ${b.y + b.vy * t}) scale(${b.s}) rotate(${b.rot})" opacity="${1 - t}">${
      kind === 'heart' ? heart(b.c) : star(b.c)}</g>`).join('');
  }, () => g.remove());
}

// Auto hug: two characters lean into each other with a giggle + hearts.
// Used when one character is dragged and dropped next to another.
function hugTogether(personEl, eyaEl, px, py, layer) {
  Audio.sfx('giggle');
  [[personEl, -8], [eyaEl, 8]].forEach(([el, dir]) => {
    if (!el) return;
    const base = el.getAttribute('transform') || '';
    tween(800, t => el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI) * dir})`),
      () => el.setAttribute('transform', base));
  });
  if (layer) floaters(layer, px, py - 200, 'heart');
}

// Hug + high-five action buttons above a person Eya has tapped.
function showPersonActions(personEl, eyaEl, px, py, layer) {
  if (!layer) return;
  layer.querySelectorAll('.pAct').forEach(n => n.remove());
  const by = py - 320;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'pAct');
  g.innerHTML = `
    <g class="hugBtn" transform="translate(${px - 66} ${by})" style="cursor:pointer">
      <circle r="50" fill="#fff" stroke="#ff8fb5" stroke-width="6"/><text y="17" text-anchor="middle" font-size="46">🤗</text>
    </g>
    <g class="hiBtn" transform="translate(${px + 66} ${by})" style="cursor:pointer">
      <circle r="50" fill="#fff" stroke="#8ecae6" stroke-width="6"/><text y="17" text-anchor="middle" font-size="46">✋</text>
    </g>`;
  layer.appendChild(g);
  const auto = setTimeout(() => g.remove(), 5000);
  g.querySelector('.hugBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); clearTimeout(auto); g.remove();
    Audio.sfx('giggle');
    [[personEl, -8], [eyaEl, 8]].forEach(([el, dir]) => {
      if (!el) return;
      const base = el.getAttribute('transform') || '';
      tween(800, t => el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI) * dir})`),
        () => el.setAttribute('transform', base));
    });
    floaters(layer, px, py - 200, 'heart');
  });
  g.querySelector('.hiBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); clearTimeout(auto); g.remove();
    if (personEl) raiseArm(personEl);
    if (eyaEl) raiseArm(eyaEl);
    Audio.sfx('clap');
    floaters(layer, px, py - 180, 'star');
  });
}

// ============================================================ DRAG MOVEMENT
// Every character is picked up and dragged. A quick tap (no drag) fires the
// character's reaction. makeWalker keeps its old name + API so every scene is
// untouched, but movement is now drag-based: walkTo/approach are instant (the
// interaction just happens where the character already is).
function makeWalker(cfg) {
  const pos = { x: cfg.x, y: cfg.y, facing: cfg.facing || 1 };
  const b = cfg.bounds;
  let destroyed = false;

  cfg.g.innerHTML = buildCharacter(cfg.spec, {});

  function place(bobY = 0) {
    const s = cfg.scaleFn ? cfg.scaleFn(pos.y) : 1;
    cfg.g.setAttribute('transform', `translate(${pos.x} ${pos.y + bobY}) scale(${s * pos.facing} ${s})`);
    if (cfg.onMove) cfg.onMove(pos);
  }

  // Instant reposition — used by door-entry + programmatic nudges.
  function walkTo(tx, ty, done) {
    tx = clamp(tx, b.minX, b.maxX);
    ty = clamp(ty, b.minY, b.maxY);
    if (tx !== pos.x) pos.facing = tx < pos.x ? -1 : 1;
    pos.x = tx; pos.y = ty; place();
    if (done) done();
  }
  // No more walking: whatever Eya was going to do, she does it right here.
  function approach(tx, ty, reach, done) { if (done) done(); }

  // Drag Eya herself around the scene.
  charDrag(cfg.g, {
    getPos: () => pos,
    move: (x, y) => { pos.x = clamp(x, b.minX, b.maxX); pos.y = clamp(y, b.minY, b.maxY); place(); },
    toLocal: cfg.toLocal,
    onTap: cfg.onTap,
    onDrop: cfg.onDrop,
  });

  // Ground taps used to walk Eya; now empty ground pans the camera (world only).
  function attachGround(el) {
    if (cfg.onPan) el.addEventListener('pointerdown', cfg.onPan);
  }

  place();
  return {
    pos, place, walkTo, approach, attachGround,
    stop() {}, destroy() { destroyed = true; },
  };
}

// Shared pointer-drag for a character group. A tap (no real movement) calls
// onTap; a drag calls move(x,y) with the target in the element's own space and
// onDrop(pos) on release. `toLocal` maps stage coords into that space.
function charDrag(el, opts) {
  el.style.cursor = 'grab';
  el.addEventListener('pointerdown', e => {
    if (App.locked) return;
    e.stopPropagation();
    const toL = opts.toLocal || (p => p);
    const grab = opts.getPos();
    const start = toL(toStage(e.clientX, e.clientY));
    const off = { x: grab.x - start.x, y: grab.y - start.y };
    let dragging = false;
    if (el.parentNode) el.parentNode.appendChild(el); // raise to front
    const move = ev => {
      const p = toL(toStage(ev.clientX, ev.clientY));
      const tx = p.x + off.x, ty = p.y + off.y;
      if (!dragging && dist(tx, ty, grab.x, grab.y) > 12) { dragging = true; Audio.sfx('pop'); }
      if (dragging) opts.move(tx, ty);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      if (!dragging) { if (opts.onTap) opts.onTap(); }
      else { Audio.sfx(opts.dropSfx || 'boing'); if (opts.onDrop) opts.onDrop(opts.getPos()); }
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

// Make a statically-drawn character group (position baked into its art) draggable
// by translating the group. Returns a live {x,y} of its current position.
function makeCharMovable(el, base, bounds, opts = {}) {
  const pos = { x: base.x, y: base.y };
  charDrag(el, {
    getPos: () => pos,
    move: (x, y) => {
      pos.x = clamp(x, bounds.minX, bounds.maxX);
      pos.y = clamp(y, bounds.minY, bounds.maxY);
      el.setAttribute('transform', `translate(${pos.x - base.x} ${pos.y - base.y})`);
    },
    onTap: opts.onTap,
    onDrop: opts.onDrop,
    dropSfx: opts.dropSfx,
  });
  return pos;
}

// Fly the food to Eya, then a squash-chew + hearts + Taglish "Sarap!".
function eyaEat(food, eya, camX) {
  const eg = eyaGroup();
  if (!eya || !eg) return;
  const s = eya.pos && typeof eya.pos.y === 'number' ? (0.5 + (eya.pos.y - 630) / 235 * 0.2) : 0.6;
  const sx = eya.pos.x - camX;
  const sy = eya.pos.y - 190 * Math.max(0.42, Math.min(0.8, s));
  const fx = $('#fxLayer') || stage;
  const food$ = document.createElementNS(SVGNS, 'text');
  food$.setAttribute('text-anchor', 'middle');
  food$.textContent = food.emoji;
  fx.appendChild(food$);
  const sX = 800, sY = 300;
  Audio.sfx('pop');
  tween(600, t => {
    const e = easeInOut(t);
    food$.setAttribute('x', sX + (sx - sX) * e);
    food$.setAttribute('y', sY + (sy - sY) * e);
    food$.setAttribute('font-size', 84 - 42 * e);
    food$.setAttribute('opacity', t > 0.85 ? (1 - (t - 0.85) / 0.15) : 1);
  }, () => {
    food$.remove();
    const inner = eg.firstElementChild;
    if (inner) {
      const base = inner.getAttribute('transform') || '';
      tween(650, t => inner.setAttribute('transform', `${base} scale(${1 + Math.sin(t * Math.PI * 3) * 0.07} ${1 - Math.sin(t * Math.PI * 3) * 0.05})`),
        () => inner.setAttribute('transform', base));
    }
    Audio.sfx('munch');
    floaters(fx, sx, sy - 30, 'heart');
    setTimeout(() => Audio.say(pick(YUMS)), 500);
  });
}

Scenes.map = {
  enter() {
    Audio.music.start();
    const spawn = State.mapSpawn || { x: 800, y: 730 };

    stage.innerHTML = `
      <defs>
        <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#aee3f5"/><stop offset="1" stop-color="#dff5fd"/>
        </linearGradient>
      </defs>
      <!-- fixed sky -->
      <rect id="mapGround0" width="1600" height="900" fill="url(#skyM)"/>
      <g class="deco" transform="translate(1340,118)">
        <g>${Array.from({ length: 12 }, (_, i) =>
          `<rect x="-7" y="-112" width="14" height="38" rx="7" fill="#ffd94d" transform="rotate(${i * 30})"/>`).join('')}
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/></g>
        <circle r="62" fill="#ffe066"/>
        <circle cx="-19" cy="-8" r="7" fill="#e8a13a"/><circle cx="19" cy="-8" r="7" fill="#e8a13a"/>
        <path d="M -20 16 Q 0 34 20 16" fill="none" stroke="#e8a13a" stroke-width="7" stroke-linecap="round"/>
      </g>
      <g fill="#fff" opacity="0.9">
        <g><ellipse cx="260" cy="110" rx="80" ry="36"/><ellipse cx="330" cy="94" rx="60" ry="30"/>
          <animateTransform attributeName="transform" type="translate" values="0 0;140 0;0 0" dur="36s" repeatCount="indefinite"/></g>
        <g><ellipse cx="760" cy="70" rx="66" ry="28"/>
          <animateTransform attributeName="transform" type="translate" values="0 0;-120 0;0 0" dur="44s" repeatCount="indefinite"/></g>
      </g>
      <!-- scrolling world -->
      <g id="world">
        <rect id="mapGround" x="0" y="240" width="${WORLD_W}" height="660" fill="#9edb7a"/>
        <path d="M 0 240 Q 400 210 800 240 Q 1200 270 1600 240 T 2400 240 T 3200 240 T ${WORLD_W} 240 L ${WORLD_W} 262 Q 3200 292 2400 262 T 800 262 T 0 262 Z" fill="#8bcf6b"/>
        <!-- barangay road loop -->
        <path id="roadPath" d="M 250 460 Q 420 380 640 366 Q 835 352 1030 366 Q 1250 380 1390 460 Q 1420 540 1120 672 Q 820 740 520 672 Q 220 560 250 460 Z"
          fill="none" stroke="#e5cda2" stroke-width="86" stroke-linejoin="round"/>
        <!-- road east to town -->
        <path d="M 1388 460 Q 1800 430 2200 470 Q 2700 520 3100 500 Q 3600 470 ${WORLD_W} 520"
          fill="none" stroke="#e5cda2" stroke-width="86" stroke-linecap="round"/>
        <path d="M 250 460 Q 420 380 640 366 Q 835 352 1030 366 Q 1250 380 1390 460 Q 1420 540 1120 672 Q 820 740 520 672 Q 220 560 250 460 Z"
          fill="none" stroke="#fffaf2" stroke-width="6" stroke-dasharray="26 30" opacity="0.8"/>
        <path d="M 1388 460 Q 1800 430 2200 470 Q 2700 520 3100 500 Q 3600 470 ${WORLD_W} 520"
          fill="none" stroke="#fffaf2" stroke-width="6" stroke-dasharray="26 30" opacity="0.8"/>
        ${MAP_DECOR}
        ${mapToysSVG()}
        ${playgroundSVG()}
        ${HOUSES.map(houseSVG).join('')}
        ${schoolSVG(PLACES[0])}
        ${churchSVG(PLACES[1])}
        ${snrSVG(PLACES[2])}
        ${smSVG(PLACES[3])}
        <g id="eyaWalk"></g>
      </g>
      ${muteButtonSVG()}
      <g id="uiLayer"></g>
    `;

    const world = $('#world');
    // camera starts centred on Eya's spawn; from here the empty ground pans it
    this.camX = clamp(spawn.x - 800, 0, WORLD_W - 1600);
    world.setAttribute('transform', `translate(${-this.camX} 0)`);
    const setCam = cx => {
      this.camX = clamp(cx, 0, WORLD_W - 1600);
      world.setAttribute('transform', `translate(${-this.camX} 0)`);
    };
    // drag empty grass to pan the world
    const panGround = e => {
      if (App.locked) return;
      const s0 = toStage(e.clientX, e.clientY);
      const cam0 = this.camX;
      let panned = false;
      const move = ev => {
        const s = toStage(ev.clientX, ev.clientY);
        if (Math.abs(s.x - s0.x) > 4) panned = true;
        setCam(cam0 - (s.x - s0.x));
      };
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
        window.removeEventListener('pointercancel', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
      window.addEventListener('pointercancel', up);
    };
    const eya = this.eya = makeWalker({
      g: $('#eyaWalk'), spec: effectiveEyaSpec(),
      x: spawn.x, y: spawn.y,
      bounds: { minX: 60, maxX: WORLD_W - 60, minY: 360, maxY: 860 },
      scaleFn: y => clamp(0.42 + (y - 300) / 900 * 0.55, 0.42, 0.78),
      uiLayer: $('#uiLayer'),
      toLocal: p => ({ x: p.x + this.camX, y: p.y }),
      onPan: panGround,
    });
    eya.place();
    const walkTo = (tx, ty, done) => eya.walkTo(tx, ty, done);
    eya.attachGround($('#mapGround'));
    installFoodTray(() => this.eya, () => this.camX);

    // decorations wiggle (skip playground pieces — they have their own handlers)
    world.querySelectorAll('.deco').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const p = toStage(e.clientX, e.clientY);
        walkTo(clamp(p.x + this.camX, 60, WORLD_W - 60), clamp(p.y + 60, 360, 860));
        Audio.sfx('pop');
        const base = el.getAttribute('transform') || '';
        tween(500, t => {
          el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI * 4) * 4})`);
        }, () => el.setAttribute('transform', base));
      });
    });

    // playground + scattered toys
    this.wirePlayground(world, eya);
    this.wireMapToys(world, eya);

    // door sequence shared by houses (data-house) and places (data-place):
    // tap the building and Eya knocks + the door swings open, then we go inside
    const enterViaDoor = (el, doorX, doorY, target, spawnBack) => {
      App.locked = true;
      Audio.sfx('knock');
      setTimeout(() => Audio.say('Tao po!'), 300);
      const door = el.querySelector('.door');
      setTimeout(() => {
        if (door) tween(450, t => {
          const k = Math.max(0.12, Math.cos(t * 1.35));
          door.setAttribute('transform', `translate(-42 0) scale(${k} 1) translate(42 0)`);
        });
        Audio.sfx('chime');
      }, 650);
      setTimeout(() => {
        State.mapSpawn = spawnBack;
        App.locked = false;
        App.go(target);
      }, 1250);
    };

    world.querySelectorAll('.house[data-house]').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const h = HOUSES.find(x => x.id === el.dataset.house);
        enterViaDoor(el, h.x + 70, h.y + 34, 'house:' + h.id, { x: h.x + 70, y: h.y + 34 });
      });
    });

    world.querySelectorAll('.house[data-place]').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const pl = PLACES.find(x => x.id === el.dataset.place);
        const doorX = pl.id === 'school' ? pl.x + 90 : pl.x;
        enterViaDoor(el, doorX, pl.y + 34, 'place:' + pl.id, { x: doorX, y: pl.y + 34 });
      });
    });

    wireMuteButton();
  },
  wireMapToys(world, eya) {
    const eyaEl = $('#eyaWalk');
    const restore = (x, y) => { eya.pos.x = x; eya.pos.y = y; eya.place(); };

    // DOG — pet it: tail wags + bark
    const dog = world.querySelector('[data-toy="dog"]');
    if (dog) dog.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(830, 560, 130, () => {
        Audio.sfx('bark');
        const tail = dog.querySelector('.dogTail');
        tween(900, t => { if (tail) tail.setAttribute('transform', `rotate(${Math.sin(t * Math.PI * 6) * 24} 40 0)`); },
          () => { if (tail) tail.setAttribute('transform', ''); });
      });
    });

    // BUBBLE WAND — puff out bubbles that float and pop when tapped
    const wand = world.querySelector('[data-toy="bubbles"]');
    if (wand) wand.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(150, 640, 120, () => {
        Audio.sfx('pop');
        for (let i = 0; i < 8; i++) {
          const b = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          b.setAttribute('style', 'cursor:pointer');
          const r = rand(16, 30);
          b.innerHTML = `<circle r="${r}" fill="#bfe8f2" opacity="0.5" stroke="#8ecae6" stroke-width="3"/>
            <circle cx="${-r / 3}" cy="${-r / 3}" r="${r / 4}" fill="#fff" opacity="0.8"/>`;
          world.appendChild(b);
          const sx = 165 + rand(-10, 10), sy = 540;
          let popped = false;
          b.addEventListener('pointerdown', ev => { ev.stopPropagation(); if (!popped) { popped = true; Audio.sfx('pop'); b.remove(); } });
          const drift = rand(-120, 120), rise = rand(360, 520), dur = rand(2600, 4200);
          tween(dur, t => b.setAttribute('transform', `translate(${sx + drift * t + Math.sin(t * 8) * 14} ${sy - rise * t})`),
            () => { if (!popped) b.remove(); });
        }
      });
    });

    // KITE — make it climb and sway
    const kite = world.querySelector('[data-toy="kite"]');
    const kiteBody = world.querySelector('#kiteBody'), kiteString = world.querySelector('#kiteString');
    if (kite) kite.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(1980, 800, 160, () => {
        Audio.sfx('whee');
        tween(5000, t => {
          const climb = Math.sin(Math.min(1, t * 2) * Math.PI / 2); // rise then hold
          const y = 430 - climb * 120;
          const x = 2060 + Math.sin(t * Math.PI * 6) * 60;
          if (kiteBody) kiteBody.setAttribute('transform', `translate(${x} ${y}) rotate(${Math.sin(t * Math.PI * 6) * 12})`);
          if (kiteString) { kiteString.setAttribute('x2', x); kiteString.setAttribute('y2', y); }
        }, () => {
          if (kiteBody) kiteBody.setAttribute('transform', 'translate(2060 430)');
          if (kiteString) { kiteString.setAttribute('x2', 2060); kiteString.setAttribute('y2', 430); }
        });
      });
    });

    // JUMP ROPE — Eya hops three times
    const rope = world.querySelector('[data-toy="rope"]');
    const ropeArc = world.querySelector('#ropeArc');
    if (rope) rope.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(2600, 810, 110, () => {
        App.locked = true;
        eya.stop();
        const baseX = 2600, baseY = 810;
        tween(1800, t => {
          const phase = t * 3; // 3 jumps
          const hop = Math.abs(Math.sin(phase * Math.PI)) * 70;
          const s = eya.scaleFn ? eya.scaleFn(baseY) : 1;
          eyaEl.setAttribute('transform', `translate(${baseX} ${baseY - hop}) scale(${s})`);
          if (ropeArc) {
            const swing = Math.cos(phase * Math.PI * 2);
            ropeArc.setAttribute('d', `M -46 -10 Q 0 ${20 + swing * 50} 46 -10`);
          }
          if (hop > 60 && !rope.dataset.b) { rope.dataset.b = '1'; Audio.sfx('boing'); }
          else if (hop < 20) rope.dataset.b = '';
        }, () => { if (ropeArc) ropeArc.setAttribute('d', 'M -46 -10 Q 0 60 46 -10'); restore(2600, 810); App.locked = false; });
      });
    });

    // TRICYCLE — hop on and ride east a short way, then hop off
    const trike = world.querySelector('[data-toy="trike"]');
    const trikeArt = world.querySelector('.trikeArt');
    if (trike) trike.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(1330, 810, 120, () => {
        App.locked = true;
        eya.stop();
        eyaEl.setAttribute('opacity', '0');
        const startX = 1330, endX = 1900;
        let putt = 0;
        tween(3200, t => {
          const x = startX + (endX - startX) * easeInOut(t);
          if (trikeArt) trikeArt.setAttribute('transform', `translate(${x - 1330} 0)`);
          // Eya rides on top
          const s = (eya.scaleFn ? eya.scaleFn(810) : 1) * 0.9;
          eyaEl.setAttribute('opacity', '1');
          eyaEl.setAttribute('transform', `translate(${x - 6} 748) scale(${s})`);
          if (t * 3200 - putt > 260) { putt = t * 3200; Audio.sfx('bounce'); }
          eya.pos.x = x; eya.pos.y = 810;
          this.camX = clamp(x - 800, 0, WORLD_W - 1600);
          world.setAttribute('transform', `translate(${-this.camX} 0)`);
        }, () => {
          if (trikeArt) trikeArt.setAttribute('transform', 'translate(0 0)'); // trike rolls home (off-screen left)
          eyaEl.setAttribute('opacity', '1');
          restore(endX + 70, 810);
          App.locked = false;
        });
      });
    });
  },

  wirePlayground(world, eya) {
    const eyaEl = $('#eyaWalk');
    const restore = (x, y) => { eya.pos.x = x; eya.pos.y = y; eya.place(); };

    // SLIDE ─ climb the ladder, whoosh down the chute
    const slide = world.querySelector('[data-pg="slide"]');
    if (slide) slide.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(2660, 800, 60, () => {
        App.locked = true;
        eya.stop();
        // climb
        tween(900, t => {
          const x = 2660 + (2705 - 2660) * t, y = 800 + (490 - 800) * t;
          const s = eya.scaleFn ? eya.scaleFn(y) : 1;
          eyaEl.setAttribute('transform', `translate(${x} ${y}) scale(${s})`);
          if (t > 0.5 && !slide.dataset.said) { slide.dataset.said = '1'; }
        }, () => {
          Audio.sfx('whee'); Audio.say('Wheee!');
          // slide down chute (quadratic P0->P1->P2)
          const P0 = [2705, 495], P1 = [2770, 760], P2 = [2910, 748];
          tween(800, t => {
            const u = 1 - t;
            const x = u * u * P0[0] + 2 * u * t * P1[0] + t * t * P2[0];
            const y = u * u * P0[1] + 2 * u * t * P1[1] + t * t * P2[1];
            const s = eya.scaleFn ? eya.scaleFn(y) : 1;
            eyaEl.setAttribute('transform', `translate(${x} ${y}) scale(${s})`);
          }, () => { restore(2910, 780); slide.dataset.said = ''; App.locked = false; });
        });
      });
    });

    // SWING ─ sit and swing back and forth
    const swing = world.querySelector('[data-pg="swing"]');
    const swingSeat = world.querySelector('#swingSeat');
    if (swing) swing.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(3080, 800, 70, () => {
        App.locked = true;
        eya.stop();
        const pivot = [3080, 430], L = 300;
        tween(2600, t => {
          const th = 0.5 * Math.sin(t * Math.PI * 6) * (1 - t * 0.15); // radians
          const sx = pivot[0] + L * Math.sin(th), sy = pivot[1] + L * Math.cos(th);
          if (swingSeat) swingSeat.setAttribute('transform', `rotate(${th * 180 / Math.PI} ${pivot[0]} ${pivot[1]})`);
          const s = eya.scaleFn ? eya.scaleFn(sy) : 1;
          eyaEl.setAttribute('transform', `translate(${sx} ${sy + 10}) scale(${s})`);
          if (Math.abs(th) > 0.45 && !swing.dataset.b) { swing.dataset.b = '1'; Audio.sfx('boing'); }
          else if (Math.abs(th) < 0.2) swing.dataset.b = '';
        }, () => { if (swingSeat) swingSeat.setAttribute('transform', ''); restore(3080, 790); App.locked = false; });
      });
    });

    // SEESAW ─ ride up and down with a friend
    const seesaw = world.querySelector('[data-pg="seesaw"]');
    const plank = world.querySelector('#seesawPlank');
    if (seesaw) seesaw.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(3300, 800, 70, () => {
        App.locked = true;
        eya.stop();
        const pivot = [3380, 745];
        tween(2400, t => {
          const th = 0.18 * Math.sin(t * Math.PI * 8) * (1 - t * 0.2);
          if (plank) plank.setAttribute('transform', `rotate(${th * 180 / Math.PI} ${pivot[0]} ${pivot[1]})`);
          const ny = 705 - Math.sin(th) * 90; // near (left) end height
          const s = eya.scaleFn ? eya.scaleFn(ny + 60) : 1;
          eyaEl.setAttribute('transform', `translate(3300 ${ny + 60}) scale(${s})`);
          if (Math.abs(th) > 0.15 && !seesaw.dataset.b) { seesaw.dataset.b = '1'; Audio.sfx('boing'); }
          else if (Math.abs(th) < 0.05) seesaw.dataset.b = '';
        }, () => { if (plank) plank.setAttribute('transform', ''); restore(3300, 800); App.locked = false; });
      });
    });

    // SANDBOX ─ build a sandcastle (tap to build, tap again to flatten)
    const sandbox = world.querySelector('[data-pg="sandbox"]');
    const castle = world.querySelector('#sandcastle');
    if (sandbox) sandbox.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(3600, 815, 95, () => {
        const built = sandbox.dataset.built === '1';
        sandbox.dataset.built = built ? '' : '1';
        Audio.sfx(built ? 'pop' : 'sparkle');
        tween(500, t => {
          const k = built ? 1 - easeInOut(t) : easeInOut(t);
          if (castle) castle.setAttribute('transform', `translate(3600 808) scale(${k})`);
        });
      });
    });

    // BEACH BALL ─ tap to make it bounce
    const ball = world.querySelector('[data-pg="ball"]');
    if (ball) ball.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (App.locked) return;
      eya.approach(3210, 805, 90, () => {
        Audio.sfx('bounce');
        tween(900, t => {
          const h = Math.abs(Math.sin(t * Math.PI * 3)) * 120 * (1 - t);
          const sq = 1 + Math.cos(t * Math.PI * 6) * 0.08 * (1 - t);
          ball.setAttribute('transform', `translate(3220 ${800 - h}) scale(${1 / sq} ${sq})`);
        }, () => ball.setAttribute('transform', 'translate(3220 800)'));
      });
    });

    // BUTTERFLIES ─ tap to make them flutter happily
    world.querySelectorAll('.butterfly').forEach(bf => {
      bf.addEventListener('pointerdown', e => {
        e.stopPropagation();
        Audio.sfx('giggle');
        const wings = bf.querySelector('.wings');
        tween(600, t => { if (wings) wings.setAttribute('transform', `scale(${1 + Math.sin(t * Math.PI * 6) * 0.3} 1)`); },
          () => { if (wings) wings.setAttribute('transform', ''); });
      });
    });
  },
  exit() {
    if (this.eya) { this.eya.destroy(); this.eya = null; }
  }
};

const INTERIOR_BOUNDS = { minX: 120, maxX: 1480, minY: 640, maxY: 865 };
const interiorScale = y => 0.5 + (y - 640) / 225 * 0.2;

Scenes.place = {
  enter(id) {
    if (id === 'school') this.enterSchool();
    else if (id === 'church') this.enterChurch();
    else if (id === 'snr') this.enterSnr();
    else if (id === 'sm') this.enterSm();
    else App.go('map');

  finishRoom(sx = 200, sy = 820) {
    const eya = this.eya = makeWalker({
      g: $('#eyaWalkP'), spec: effectiveEyaSpec(),
      x: sx, y: sy, bounds: INTERIOR_BOUNDS, scaleFn: interiorScale,
      uiLayer: $('#uiLayerP'),
    });

    $('#homeBtn').addEventListener('pointerdown', e => { e.stopPropagation(); App.go('map'); });

    this.eya.approach(470, 815, 120, () => {
      App.locked = true;
      const fx = $('#fxLayer');
      fx.innerHTML = `
        <g id="storyBook" transform="translate(800 470)" opacity="0">

      let i = 0;
      const flip = () => {

  openDrawing() {
    const colors = ['#e05a6a', '#4a90d9', '#ffd94d', '#9edb7a'];
    let color = colors[0];
    const overlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    overlay.setAttribute('id', 'drawOverlay');
    overlay.innerHTML = `
      <rect width="1600" height="900" fill="#2a2a30" opacity="0.4"/>
      <rect x="200" y="120" width="1200" height="660" rx="18" fill="#fffaf2" id="drawPaper" style="cursor:crosshair"/>
      <g id="inkLayer" pointer-events="none"></g>
      ${colors.map((c, i) => `<circle class="crayon" data-c="${c}" cx="${260 + i * 90}" cy="820" r="34" fill="${c}" stroke="${c === color ? '#2a2a30' : '#fff'}" stroke-width="5" style="cursor:pointer"/>`).join('')}
      <g id="eraseBtn" style="cursor:pointer"><circle cx="${260 + 4 * 90}" cy="820" r="34" fill="#fff" stroke="#c9c9d2" stroke-width="5"/><text x="${260 + 4 * 90}" y="834" text-anchor="middle" font-size="34">🧽</text></g>
      <g id="drawDone" style="cursor:pointer"><circle cx="1340" cy="820" r="40" fill="#9edb7a" stroke="#fff" stroke-width="6"/><path d="M 1322 820 L 1335 834 L 1360 806" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>`;
    stage.appendChild(overlay);
    const paper = $('#drawPaper'), ink = $('#inkLayer');
    let drawing = false, pts = [], line = null;
    const start = e => {
      drawing = true; pts = []; Audio.sfx('pop');
      line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      line.setAttribute('fill', 'none'); line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', '12'); line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('stroke-linejoin', 'round');
      ink.appendChild(line);
      add(e);
    };
    const add = e => {
      const p = toStage(e.clientX, e.clientY);
      pts.push(`${p.x.toFixed(0)},${p.y.toFixed(0)}`);
      line.setAttribute('points', pts.join(' '));
    };
    const move = e => { if (drawing) add(e); };
    const end = () => { drawing = false; };
    paper.addEventListener('pointerdown', start);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', end);
    overlay.querySelectorAll('.crayon').forEach(cr => cr.addEventListener('pointerdown', e => {
      e.stopPropagation(); color = cr.dataset.c; Audio.sfx('sparkle');
      overlay.querySelectorAll('.crayon').forEach(o => o.setAttribute('stroke', o.dataset.c === color ? '#2a2a30' : '#fff'));
    }));
    $('#eraseBtn').addEventListener('pointerdown', e => { e.stopPropagation(); ink.innerHTML = ''; Audio.sfx('boing'); });
    $('#drawDone').addEventListener('pointerdown', e => {
      e.stopPropagation();
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', end);
      Audio.sfx('chime');
      overlay.remove();
    });
  },

// ============================================================ INTERIORS
function lighten(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const L = v => Math.round(v + (255 - v) * f);
  return `rgb(${L(n >> 16 & 255)},${L(n >> 8 & 255)},${L(n & 255)})`;
}

// ---- drag with springy wobble
function getXY(el) { return { x: +el.dataset.x, y: +el.dataset.y }; }
function setXY(el, x, y) {
  el.dataset.x = x; el.dataset.y = y;
  el.setAttribute('transform', `translate(${x} ${y}) scale(${el.dataset.s || 1})`);
}
function wobble(el) {
  const s = +(el.dataset.s || 1);
  tween(420, t => {
    const k = 1 + Math.sin(t * Math.PI * 3) * 0.14 * (1 - t);
    el.setAttribute('transform', `translate(${el.dataset.x} ${el.dataset.y}) scale(${s * k} ${s * (2 - k > 0 ? 2 - k : 1)})`);
  }, () => setXY(el, +el.dataset.x, +el.dataset.y));
}
function makeDraggable(el, opts = {}) {
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const start = toStage(e.clientX, e.clientY);
    const base = getXY(el);
    const off = { x: base.x - start.x, y: base.y - start.y };
    el.parentNode.appendChild(el); // raise to front
    Audio.sfx('pop');
    let moved = false;
    const move = ev => {
      const p = toStage(ev.clientX, ev.clientY);
      moved = true;
      setXY(el, clamp(p.x + off.x, 50, 1550), clamp(p.y + off.y, 140, 870));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      wobble(el);
      if (moved) Audio.sfx(opts.dropSfx || 'boing');
      if (opts.onDrop) opts.onDrop(+el.dataset.x, +el.dataset.y, el);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

function confettiBurst(x, y) {
  const fx = $('#fxLayer');
  if (!fx) return;
  const colors = ['#ff8fb5', '#ffd94d', '#8ecae6', '#9edb7a', '#f47a5e', '#c9a0f0'];
  const bits = Array.from({ length: 40 }, () => ({
    x: x + rand(-40, 40), y: y + rand(-30, 10),
    vx: rand(-260, 260), vy: rand(-520, -180),
    rot: rand(0, 360), vr: rand(-500, 500), c: pick(colors), w: rand(10, 20),
  }));
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  fx.appendChild(g);
  tween(1400, t => {
    const s = t * 1.4;
    g.innerHTML = bits.map(b => {
      const bx = b.x + b.vx * s, by = b.y + b.vy * s + 420 * s * s;
      return `<rect x="-8" y="-5" width="${b.w}" height="10" rx="3" fill="${b.c}"
        transform="translate(${bx} ${by}) rotate(${b.rot + b.vr * s})" opacity="${1 - t * 0.7}"/>`;
    }).join('');
  }, () => g.remove());
}

    // people (residents + Eya) can only be dragged around inside the house
    const RES_BOUNDS = { minX: 200, maxX: 1420, minY: 700, maxY: 852 };
    const residents = [];
    const eya = this.eya = makeWalker({
      g: $('#eyaWalkH'), spec: effectiveEyaSpec(),
      x: 250, y: 800,
      bounds: { minX: 160, maxX: 1440, minY: 700, maxY: 858 },
      scaleFn: y => 0.5 + (y - 630) / 235 * 0.2,
      uiLayer: $('#uiLayerH'),
      onDrop: p => {
        const near = residents.find(r => dist(r.pos.x, r.pos.y, p.x, p.y) < 180);
        if (near) hugTogether(near.el.firstElementChild, $('#eyaWalkH').firstElementChild, near.pos.x, near.pos.y, $('#uiLayerH'));
      },
    });
    eya.attachGround($('#roomGround'));
    installFoodTray(() => this.eya);

    rl.querySelectorAll('.resident').forEach(el => {
      const base = residentPos[el.dataset.key];
      const react = () => {
        waveCharacter(el);
        Audio.sfx('chime');
        Audio.say(CHARACTERS[el.dataset.key].label);
        showPersonActions(el.firstElementChild, $('#eyaWalkH').firstElementChild, pos.x, pos.y, $('#uiLayerH'));
      };
      const pos = makeCharMovable(el, base, RES_BOUNDS, {
        onTap: react,
        onDrop: p => {
          if (dist(p.x, p.y, eya.pos.x, eya.pos.y) < 180)
            hugTogether(el.firstElementChild, $('#eyaWalkH').firstElementChild, p.x, p.y, $('#uiLayerH'));
        },
      });
      residents.push({ el, pos });
    });
    // welcome wave from the host — and a compliment if Eya changed her outfit
    const host = rl.querySelector('.resident');
    if (host) setTimeout(() => waveCharacter(host), 400);
    const outfitNow = JSON.stringify(State.outfit);
    if (State.lastCheeredOutfit && State.lastCheeredOutfit !== outfitNow) {
      setTimeout(() => { Audio.say('Ang ganda mo, Eya!'); Audio.sfx('sparkle'); }, 900);
    }
    State.lastCheeredOutfit = outfitNow;

    // props
    const pl = $('#propLayer');
    pl.innerHTML = props.map(p => `
      ${p.table ? `<g transform="translate(${p.x} ${p.y + 24})">
        <rect x="-110" y="-14" width="220" height="20" rx="8" fill="#a87c4a"/>
        <rect x="-92" y="6" width="16" height="86" fill="#8a6242"/>
        <rect x="76" y="6" width="16" height="86" fill="#8a6242"/></g>` : ''}
      <g class="prop" data-id="${p.id}" data-x="${p.x}" data-y="${p.y}" data-s="${p.s}"
         transform="translate(${p.x} ${p.y}) scale(${p.s})" style="cursor:pointer">${propArt(p)}</g>
    `).join('');

    props.forEach(p => {
      const el = pl.querySelector(`.prop[data-id="${p.id}"]`);
      switch (p.kind) {
        case 'drag':
          makeDraggable(el, { dropSfx: p.dropSfx, onDrop: (x, y) => Scenes.house.onPropDrop(h, p, x, y, el) });
          break;
        case 'wardrobe':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            eya.approach(p.x, p.y, 230, () => {
              Audio.sfx('sparkle');
              App.go('dressup');
            });
          });
          break;
        case 'tap':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            eya.approach(p.x, p.y, 210, () => {
              Audio.sfx(p.sfx || 'pop');
              const s = p.s;
              if (p.anim === 'rock') {
                tween(900, t => el.setAttribute('transform',
                  `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 4) * 12})`),
                  () => setXY(el, p.x, p.y));
              } else if (p.anim === 'pulse' || p.anim === 'squeeze') {
                tween(500, t => {
                  const k = 1 + Math.sin(t * Math.PI * 2) * 0.12;
                  el.setAttribute('transform', `translate(${p.x} ${p.y}) scale(${s * k} ${s / k})`);
                }, () => setXY(el, p.x, p.y));
              } else if (p.anim === 'wiggle') {
                tween(500, t => el.setAttribute('transform',
                  `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 6) * 4})`),
                  () => setXY(el, p.x, p.y));
              } else if (p.anim === 'sheen') {
                const sheen = el.querySelector('.sheen');
                tween(600, t => sheen && sheen.setAttribute('transform', `translate(${-60 + t * 120} 0)`));
              }
            });
          });
          break;
        case 'water':
          makeDraggable(el, {
            onDrop: (x, y) => {
              props.filter(q => q.kind === 'pot').forEach(q => {
                const potEl = pl.querySelector(`.prop[data-id="${q.id}"]`);
                if (potEl && dist(x, y, +potEl.dataset.x, +potEl.dataset.y) < 150) {
                  const fl = potEl.querySelector('.flower');
                  if (fl && !potEl.dataset.bloomed) {
                    potEl.dataset.bloomed = '1';
                    Audio.sfx('sparkle');
                    tween(700, t => fl.setAttribute('transform', `scale(${easeInOut(t)})`));
                  }
                }
              });
            }
          });
          break;
        case 'pot': break; // static target
        case 'peek':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            Audio.sfx('pop');
            const fx = $('#fxLayer');
            fx.innerHTML = `
              <defs><mask id="peekMask">
                <rect width="1600" height="900" fill="white"/>
                <circle cx="710" cy="440" r="180" fill="black"/>
                <circle cx="930" cy="440" r="180" fill="black"/>
              </mask></defs>
              <rect width="1600" height="900" fill="#1a1a22" mask="url(#peekMask)" opacity="0.93"/>`;
            setTimeout(() => { fx.innerHTML = ''; Audio.sfx('chime'); }, 1600);
          });
          break;
        case 'umbrella':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            eya.approach(p.x, p.y, 210, () => {
              Audio.sfx('boing');
              const open = el.querySelector('.umb-open'), closed = el.querySelector('.umb-closed');
              const isOpen = open.style.display !== 'none';
              open.style.display = isOpen ? 'none' : '';
              closed.style.display = isOpen ? '' : 'none';
              wobble(el);
            });
          });
          break;
        case 'flash':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            eya.approach(p.x, p.y, 210, () => {
              Audio.sfx('chime');
              const fx = $('#fxLayer');
              fx.innerHTML = `<rect width="1600" height="900" fill="#fff"/>`;
              setTimeout(() => { fx.innerHTML = ''; }, 180);
            });
          });
          break;
      }
    });

    // ---- tiny optional wish (thought bubble)
    this.taskState = null;
    const task = HOUSE_TASKS[h.id];
    const taskProp = task && props.find(p => p.id === task.propId);
    const tp = task && residentPos[task.target];
    if (task && taskProp && tp) {
      const bx = tp.x + 30, by = tp.y - 320; // above the resident's head
      const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      bubble.setAttribute('id', 'wishBubble');
      bubble.innerHTML = `
        <g transform="translate(${bx} ${by})">
          <circle cx="-72" cy="76" r="10" fill="#fff" opacity="0.95"/>
          <circle cx="-54" cy="56" r="16" fill="#fff" opacity="0.95"/>
          <ellipse cx="0" cy="0" rx="92" ry="70" fill="#fff" opacity="0.97"/>
          <ellipse cx="-58" cy="-22" rx="42" ry="34" fill="#fff" opacity="0.97"/>
          <ellipse cx="56" cy="-20" rx="44" ry="36" fill="#fff" opacity="0.97"/>
          <g transform="scale(0.55) translate(0 10)">${propArt(taskProp)}</g>
          <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="2.6s" repeatCount="indefinite" additive="sum"/>
        </g>`;
      $('#fxLayer').before(bubble);
      this.taskState = { ...task, tp, done: false };
    }

    $('#homeBtn').addEventListener('pointerdown', e => {
      e.stopPropagation();
      App.go('map');
    });
    wireMuteButton();
  },
  onPropDrop(h, p, x, y, el) {
    const ts = this.taskState;
    if (!ts || ts.done || p.id !== ts.propId) return;
    if (dist(x, y, ts.tp.x, ts.tp.y - 110) > 190) return;
    ts.done = true;
    const bubble = $('#wishBubble');
    if (bubble) {
      Audio.sfx('sparkle');
      tween(300, t => bubble.setAttribute('opacity', 1 - t), () => bubble.remove());
    }
    Audio.sfx('fanfare');
    confettiBurst(ts.tp.x, ts.tp.y - 260);
    const target = stage.querySelector(`.resident[data-key="${ts.target}"]`);
    if (target) { waveCharacter(target); setTimeout(() => waveCharacter(target), 1300); }
    setTimeout(() => Audio.say(CHEER), 500);
  },
  exit() {
    if (this.eya) { this.eya.destroy(); this.eya = null; }
  }
};

// ============================================================ DRESS-UP
Scenes.dressup = {
  cat: 'top',
  enter() {
    this.cat = 'top';
    stage.innerHTML = `
      <defs>
        <linearGradient id="duBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fde8f0"/><stop offset="1" stop-color="#f6d8ec"/>
        </linearGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#duBg)"/>
      <circle cx="820" cy="430" r="300" fill="#fff" opacity="0.5"/>
      <g fill="#ff8fb5" opacity="0.6">
        <path d="M 320 120 C 300 100 270 110 275 135 C 260 120 235 135 245 155 Q 275 175 320 150 Z" transform="scale(0.9)"/>
        <circle cx="1300" cy="150" r="10"/><circle cx="1350" cy="110" r="7"/><circle cx="260" cy="640" r="9"/>
        <circle cx="480" cy="130" r="8" fill="#ffd94d"/><circle cx="1240" cy="620" r="8" fill="#ffd94d"/>
      </g>
      ${bigLabel(800, 92, 'Bihis Tayo!', { size: 60, fill: '#e8709c', stroke: '#fff' })}
      <g id="duEya"></g>
      <g id="duTabs"></g>
      <g id="duItems"></g>
      <g id="backBtn" style="cursor:pointer">
        <circle cx="92" cy="94" r="58" fill="#fff" opacity="0.9"/>
        <path d="M 118 94 L 74 94 M 92 72 L 70 94 L 92 116" stroke="#e8709c" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      ${muteButtonSVG()}
    `;
    this.renderEya();
    this.renderTabs();
    this.renderItems();
    $('#backBtn').addEventListener('pointerdown', () => App.go('house:eya'));
    wireMuteButton();
  },
  renderEya() {
    $('#duEya').innerHTML = buildCharacter(effectiveEyaSpec(), { x: 820, y: 660, scale: 1.35, idle: true });
  },
  renderTabs() {
    const tabs = [
      { cat: 'top', icon: WARDROBE.top[0].icon },
      { cat: 'hat', icon: WARDROBE.hat[0].icon },
      { cat: 'shoes', icon: WARDROBE.shoes[0].icon },
    ];
    $('#duTabs').innerHTML = tabs.map((t, i) => `
      <g class="duTab" data-cat="${t.cat}" style="cursor:pointer" transform="translate(160 ${260 + i * 190})">
        <circle r="76" fill="${this.cat === t.cat ? '#ffd7e6' : '#fff'}"
          stroke="${this.cat === t.cat ? '#e8709c' : '#e8d0dc'}" stroke-width="7"/>
        <g transform="scale(1.5)">${t.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duTab').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        this.cat = el.dataset.cat;
        Audio.sfx('pop');
        this.renderTabs();
        this.renderItems();
      });
    });
  },
  renderItems() {
    const items = WARDROBE[this.cat];
    // Fit any number of items in the row centered at x≈930 (right of the tabs).
    const n = items.length;
    const spacing = n > 1 ? Math.min(190, 1180 / (n - 1)) : 0;
    const r = Math.min(80, spacing * 0.46) || 80;
    const iconScale = 1.6 * (r / 80);
    const startX = 930 - (n - 1) * spacing / 2;
    $('#duItems').innerHTML = items.map((it, i) => `
      <g class="duItem" data-id="${it.id}" style="cursor:pointer" transform="translate(${startX + i * spacing} 790)">
        <circle r="${r}" fill="${State.outfit[this.cat] === it.id ? '#ffd7e6' : '#fff'}"
          stroke="${State.outfit[this.cat] === it.id ? '#e8709c' : '#e8d0dc'}" stroke-width="7"/>
        <g transform="scale(${iconScale})">${it.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duItem').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        State.outfit[this.cat] = el.dataset.id;
        State.saveOutfit();
        Audio.sfx('sparkle');
        this.renderEya();
        this.renderItems();
      });
    });
  },
  exit() {}
};

// ============================================================ ENGINE
const App = {
  root: stage,
  current: null,
  locked: false,           // guards mid-sequence navigation (door opening)
  _lastGo: 0,
  go(id) {
    if (App.locked) return;
    const now = performance.now();
    if (App.current && now - App._lastGo < 350) return; // toddler double-tap guard (never blocks the first scene)
    App._lastGo = now;
    if (App.current && App.current.exit) App.current.exit();
    const [name, param] = id.split(':');
    App.current = Scenes[name];
    App.current.enter(param);
  }
};

// block context menu / long-press menus and pinch zoom
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

State.loadOutfit();
State.lastCheeredOutfit = JSON.stringify(State.outfit);

// offline support (no-op on file:// or unsupported browsers)
try {
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js');
  }
} catch (e) {}

// Portrait handling: rotate the stage 90° to fill the screen so the game stays
// playable and upright even when the phone's rotation lock keeps it in portrait.
// In landscape we clear the inline styles and let the CSS 16:9 fit take over.
function fitStage() {
  const portrait = window.innerHeight > window.innerWidth;
  const s = stage.style;
  if (portrait) {
    const availLong = window.innerHeight, availShort = window.innerWidth;
    let w = availLong, h = w * 9 / 16;          // try to fill screen height
    if (h > availShort) { h = availShort; w = h * 16 / 9; }  // else fit screen width
    s.width = w + 'px';
    s.height = h + 'px';
    s.maxWidth = 'none';
    s.maxHeight = 'none';
    s.transform = 'rotate(90deg)';
  } else {
    s.width = s.height = s.maxWidth = s.maxHeight = s.transform = '';
  }
}
fitStage();
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));

// iOS restores suspended pages instead of reloading — recover cleanly.
window.addEventListener('pageshow', e => {
  if (e.persisted) location.reload();
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    Audio.unlock();
    try { speechSynthesis.cancel(); } catch (e) {}
  }
});

// #lineup, #map, #house-<id>, #place-<id>, #dressup are debug entry points
const dbg = location.hash.slice(1);
App.go(dbg === 'lineup' ? 'lineup'
  : dbg === 'map' ? 'map'
  : dbg === 'dressup' ? 'dressup'
  : dbg.startsWith('house-') ? 'house:' + dbg.slice(6)
  : dbg.startsWith('place-') ? 'place:' + dbg.slice(6)
  : 'title');
</script>
