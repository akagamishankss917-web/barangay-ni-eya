<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

<title>Barangay ni Eya</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#7ec8e3;
    touch-action:none;

    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
  }
  body { display:flex; align-items:center; justify-content:center; }
  #stage {
    display:block;
    width:100vw; height:56.25vw;      /* 16:9 */
    max-height:100vh; max-width:177.78vh;
    touch-action:none;
  }
  #stage text { pointer-events:none; }
  #rotate-hint {
    position:fixed; inset:0; z-index:10;
    display:none; align-items:center; justify-content:center;

    0%, 20% { transform:rotate(0deg); }
    60%, 100% { transform:rotate(90deg); }

<body>

<svg id="stage" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"></svg>

<div id="rotate-hint" aria-hidden="true">
  <svg viewBox="0 0 400 400" width="60%" style="max-width:340px">
    <g class="spin-phone">
      <rect x="150" y="90" width="100" height="180" rx="18" fill="#fff" stroke="#4a6b7c" stroke-width="10"/>
      <circle cx="200" cy="242" r="10" fill="#4a6b7c"/>
      <rect x="180" y="108" width="40" height="8" rx="4" fill="#4a6b7c"/>
    </g>
    <path d="M 110 330 A 120 120 0 0 1 60 210" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
    <path d="M 40 240 L 60 200 L 92 232 Z" fill="#fff"/>
  </svg>
</div>

<script>
'use strict';

// ============================================================ HELPERS
const $  = sel => document.querySelector(sel);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const dist  = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

const stage = document.getElementById('stage');

// Convert a client (pointer) coordinate to 1600x900 design space.
function toStage(clientX, clientY) {
  const pt = new DOMPoint(clientX, clientY);
  const m = stage.getScreenCTM();
  if (!m) return { x: 0, y: 0 };
  const p = pt.matrixTransform(m.inverse());
  return { x: p.x, y: p.y };
}

// requestAnimationFrame tween. fn(t) gets t in [0,1]. Returns cancel().
function tween(ms, fn, done) {
  let cancelled = false;
  const t0 = performance.now();
  function frame(now) {
    if (cancelled) return;
    const t = clamp((now - t0) / ms, 0, 1);
    fn(t);
    if (t < 1) requestAnimationFrame(frame);
    else if (done) done();
  }
  requestAnimationFrame(frame);
  return () => { cancelled = true; };
}
const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

// ============================================================ STATE
const State = {
  muted: false,
  outfit: null,            // filled by dress-up task
  lastCheeredOutfit: null,
  mapSpawn: null,          // where Eya stands when returning to map
};

// ============================================================ AUDIO
// Everything synthesized in WebAudio (no audio files); Taglish phrases via
// on-device speech synthesis. All guarded — silence is always acceptable.
const Audio = (() => {
  let ctx = null, master = null, musicGain = null, musicTimer = null;

  try { State.muted = localStorage.getItem('eya-muted') === '1'; } catch (e) {}

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = State.muted ? 0 : 1;
      master.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.09;
      musicGain.connect(master);
    } catch (e) { ctx = null; }
    return ctx;
  }

  // one short synthesized tone
  function tone({ freq = 440, dur = 0.15, type = 'sine', vol = 0.5, at = 0, slide = 0, out = null }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(out || master);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }

  function noise({ dur = 0.08, vol = 0.5, freq = 800, at = 0 }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start(t0);
  }

  const SFX = {
    knock()   { noise({ dur: 0.09, vol: 0.9, freq: 320 }); noise({ dur: 0.09, vol: 0.9, freq: 300, at: 0.22 }); },
    pop()     { tone({ freq: 500, dur: 0.09, type: 'square', vol: 0.25, slide: 300 }); },
    sparkle() { [1200, 1600, 2100, 2700].forEach((f, i) => tone({ freq: f, dur: 0.12, vol: 0.22, at: i * 0.05 })); },
    boing()   { tone({ freq: 180, dur: 0.28, type: 'triangle', vol: 0.5, slide: 260 }); },
    chime()   { tone({ freq: 880, dur: 0.4, vol: 0.3 }); tone({ freq: 1320, dur: 0.5, vol: 0.2, at: 0.08 }); },
    step()    { noise({ dur: 0.04, vol: 0.25, freq: 700 }); },
    meow()    { tone({ freq: 700, dur: 0.35, type: 'sawtooth', vol: 0.12, slide: -280 }); },
    bounce()  { tone({ freq: 240, dur: 0.14, type: 'triangle', vol: 0.4, slide: -120 }); },
    fanfare() {
      [[523, 0], [659, 0.12], [784, 0.24], [1047, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.35, type: 'triangle', vol: 0.35, at }));
      [[523, 0.38], [659, 0.38], [784, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.6, type: 'triangle', vol: 0.2, at }));
    },
  };

  // gentle plucked pentatonic lullaby-ish loop
  const SCALE = [392, 440, 523, 587, 659, 784];
  function scheduleBar() {
    if (!ctx || State.muted) return;
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.75) {
        tone({ freq: pick(SCALE), dur: 0.5, type: 'sine', vol: 0.5, at: i * 0.42, out: musicGain });
      }
      if (i === 0 && Math.random() < 0.5) {
        tone({ freq: pick(SCALE) / 2, dur: 0.9, type: 'triangle', vol: 0.25, at: 0, out: musicGain });
      }
    }
  }

  let voice = null, voiceLoaded = false;
  function pickVoice() {
    if (voiceLoaded) return;
    try {
      const vs = speechSynthesis.getVoices();
      if (!vs.length) return;
      voice = vs.find(v => /^(fil|tl)/i.test(v.lang)) || null;
      voiceLoaded = true;
    } catch (e) {}
  }
  try { speechSynthesis.addEventListener('voiceschanged', pickVoice); } catch (e) {}

  return {
    unlock() {
      const c = ensureCtx();
      try { if (c && c.state === 'suspended') c.resume(); } catch (e) {}
      try { speechSynthesis.resume(); } catch (e) {}
      pickVoice();
    },
    sfx(name) {
      if (State.muted || !ensureCtx()) return;
      try { SFX[name] && SFX[name](); } catch (e) {}
    },
    say(text) {
      if (State.muted) return;
      try {
        pickVoice();
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.pitch = 1.2; u.volume = 1;
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      } catch (e) {}
    },
    music: {
      start() {
        if (musicTimer || !ensureCtx()) return;
        scheduleBar();
        musicTimer = setInterval(scheduleBar, 1700);
      },
      stop() { clearInterval(musicTimer); musicTimer = null; },
    },
    setMuted(b) {
      State.muted = b;
      try { localStorage.setItem('eya-muted', b ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = b ? 0 : 1;
      if (b) { try { speechSynthesis.cancel(); } catch (e) {} }
    },
  };
})();

// Mute button helper — scenes render this and call wireMuteButton().
function muteButtonSVG() {
  return `<g id="muteBtn" style="cursor:pointer">
    <circle cx="1520" cy="80" r="52" fill="#ffffff" opacity="0.85"/>
    <text id="muteIcon" x="1520" y="102" text-anchor="middle" font-size="56">${State.muted ? '🔇' : '🔊'}</text>
  </g>`;
}
function wireMuteButton() {
  const btn = $('#muteBtn');
  if (!btn) return;
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    Audio.setMuted(!State.muted);
    $('#muteIcon').textContent = State.muted ? '🔇' : '🔊';
    if (!State.muted) Audio.sfx('pop');
  });
}

// ============================================================ ART — character rig
// Coordinate system per character: origin at center of feet, head top ≈ y=-330.
// Same face geometry for everyone; female full-hair styles overlay a hair ring
// with a skin "face window" so features sit at identical coordinates.

const FACE = { eyeY: -256, eyeX: 24, mouthY: -230, browY: -278, blushY: -238, blushX: 40 };

function hairBack(spec) {
  const hc = spec.hairColor;
  switch (spec.hair) {
    case 'pigtails':
      return `<circle cx="-80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="-80" cy="-260" r="7" fill="#ffb0c8"/>
              <circle cx="80" cy="-260" r="7" fill="#ffb0c8"/>`;
    case 'longStraight':
      return `<path d="M -70 -270 Q -78 -160 -64 -120 L -30 -130 L -40 -230 L 40 -230 L 30 -130 L 64 -120 Q 78 -160 70 -270 Z" fill="${hc}"/>`;
    case 'longWavy':
      return `<path d="M -70 -270 Q -84 -200 -70 -170 Q -80 -140 -62 -112 L -30 -128 L -40 -230 L 40 -230 L 30 -128 L 62 -112 Q 80 -140 70 -170 Q 84 -200 70 -270 Z" fill="${hc}"/>
              <circle cx="-64" cy="-118" r="14" fill="${hc}"/><circle cx="64" cy="-118" r="14" fill="${hc}"/>`;
    case 'shoulderBob':
      return `<path d="M -72 -270 Q -80 -190 -62 -168 Q -30 -152 0 -152 Q 30 -152 62 -168 Q 80 -190 72 -270 Z" fill="${hc}"/>`;
    case 'ponytail':
      return `<circle cx="62" cy="-300" r="20" fill="${hc}"/>
              <path d="M 62 -300 Q 92 -260 78 -190 Q 70 -168 60 -186 Q 70 -250 52 -290 Z" fill="${hc}"/>
              <circle cx="58" cy="-296" r="7" fill="#e8b13a"/>`;
    default: return '';
  }
}

function hairFront(spec) {
  const hc = spec.hairColor;
  const fullHair = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'].includes(spec.hair);
  if (fullHair) {
    // hair ring + face window (fringe all around)
    return `<circle cx="0" cy="-258" r="71" fill="${hc}"/>
            <ellipse cx="0" cy="-244" rx="54" ry="50" fill="${spec.skin}"/>`;
  }
  switch (spec.hair) {
    case 'shortSpiky':
      return `<path d="M -64 -268 A 66 66 0 0 1 64 -268 L 62 -256 Q 44 -270 40 -262 Q 20 -278 12 -266 Q -6 -280 -16 -266 Q -36 -276 -44 -262 Q -58 -268 -62 -254 Z" fill="${hc}"/>
              <path d="M -50 -308 L -40 -326 L -32 -308 Z" fill="${hc}"/>
              <path d="M -18 -316 L -8 -334 L 0 -314 Z" fill="${hc}"/>
              <path d="M 14 -316 L 24 -332 L 32 -312 Z" fill="${hc}"/>
              <path d="M 42 -306 L 52 -320 L 58 -302 Z" fill="${hc}"/>`;
    case 'shortNeat':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -252 Q 30 -272 -10 -268 Q -46 -264 -64 -248 Z" fill="${hc}"/>`;
    case 'swept':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -240 Q 56 -262 34 -266 Q 54 -280 30 -290 Q -6 -302 -38 -288 Q -62 -276 -64 -246 Z" fill="${hc}"/>
              <path d="M -60 -282 Q -20 -306 24 -294 Q 44 -288 50 -276 Q 20 -290 -16 -284 Q -44 -278 -58 -266 Z" fill="${hc}"/>`;
    default: return '';
  }
}

function drawGlasses(spec) {
  if (!spec.glasses) return '';
  const { eyeX, eyeY } = FACE;
  if (spec.glasses === 'round')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <circle cx="-${eyeX}" cy="${eyeY}" r="19"/><circle cx="${eyeX}" cy="${eyeY}" r="19"/>
      <line x1="-5" y1="${eyeY - 4}" x2="5" y2="${eyeY - 4}"/></g>`;
  if (spec.glasses === 'rect')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <rect x="-${eyeX + 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <rect x="${eyeX - 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}"/></g>`;
  // sun
  return `<g><rect x="-${eyeX + 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <rect x="${eyeX - 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}" stroke="#2c2c34" stroke-width="5"/>
    <circle cx="-${eyeX + 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/><circle cx="${eyeX - 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/></g>`;
}

function drawMouth(spec) {
  const y = FACE.mouthY;
  switch (spec.smile) {
    case 'open':
      return `<path d="M -20 ${y - 4} Q 0 ${y + 26} 20 ${y - 4} Q 0 ${y + 4} -20 ${y - 4} Z" fill="#a04a52"/>
              <ellipse cx="0" cy="${y + 12}" rx="9" ry="5" fill="#ff8fa0"/>`;
    case 'braces': {
      return `<path d="M -18 ${y - 4} Q 0 ${y + 22} 18 ${y - 4} Q 0 ${y + 2} -18 ${y - 4} Z" fill="#a04a52"/>
              <path d="M -13 ${y - 1} Q 0 ${y + 7} 13 ${y - 1}" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path d="M -13 ${y - 1} Q 0 ${y + 7} 13 ${y - 1}" stroke="#9ad1e8" stroke-width="2.5" fill="none" stroke-dasharray="3 4"/>`;
    }
    case 'grin':
      return `<path d="M -22 ${y - 8} Q 0 ${y + 16} 22 ${y - 8}" stroke="#8c4a4a" stroke-width="7" fill="none" stroke-linecap="round"/>`;
    case 'soft':
    default: {
      const lips = spec.lips
        ? `<path d="M -14 ${y - 2} Q -7 ${y - 8} 0 ${y - 2} Q 7 ${y - 8} 14 ${y - 2} Q 7 ${y + 10} 0 ${y + 8} Q -7 ${y + 10} -14 ${y - 2} Z" fill="${spec.lips}"/>`
        : `<path d="M -13 ${y - 2} Q 0 ${y + 10} 13 ${y - 2}" stroke="#8c4a4a" stroke-width="6" fill="none" stroke-linecap="round"/>`;
      return lips;
    }
  }
}

function drawHat(spec) {
  switch (spec.hat) {
    case 'tiara':
      return `<g transform="translate(0,-316)">
        <path d="M -34 6 L -34 -14 L -20 -2 L -8 -20 L 0 -4 L 8 -20 L 20 -2 L 34 -14 L 34 6 Q 0 14 -34 6 Z" fill="#f2c94c" stroke="#d9a834" stroke-width="3"/>
        <circle cx="-20" cy="-8" r="3.5" fill="#fff"/><circle cx="0" cy="-12" r="4.5" fill="#ffd7e0"/><circle cx="20" cy="-8" r="3.5" fill="#fff"/></g>`;
    case 'bow':
      return `<g transform="translate(34,-318) rotate(18)">
        <path d="M 0 0 L -24 -14 Q -30 0 -24 14 Z" fill="#fff" stroke="#e0d0d8" stroke-width="2"/>
        <path d="M 0 0 L 24 -14 Q 30 0 24 14 Z" fill="#fff" stroke="#e0d0d8" stroke-width="2"/>
        <circle r="7" fill="#f0e0e8"/></g>`;
    case 'sunhat':
      return `<g transform="translate(0,-312)">
        <ellipse cx="0" cy="6" rx="84" ry="18" fill="#f0d9a8"/>
        <path d="M -46 4 Q -46 -34 0 -34 Q 46 -34 46 4 Z" fill="#f6e4bc"/>
        <path d="M -46 -2 Q 0 8 46 -2" stroke="#ff8fb5" stroke-width="8" fill="none"/></g>`;
    case 'partyhat':
      return `<g transform="translate(0,-318)">
        <path d="M -30 8 L 0 -58 L 30 8 Z" fill="#8ecae6"/>
        <path d="M -21 -12 L 21 -12 L 26 0 L -26 0 Z" fill="#ffd94d"/>
        <circle cx="0" cy="-58" r="9" fill="#ff8fb5"/></g>`;
    default: return '';
  }
}

function drawTop(spec) {
  const t = spec.top, c = t.color;
  switch (t.type) {
    case 'dress': {
      const collar = t.collar ? `
        <path d="M -30 -190 L 0 -170 L -38 -158 Q -44 -176 -30 -190 Z" fill="${t.collar}"/>
        <path d="M 30 -190 L 0 -170 L 38 -158 Q 44 -176 30 -190 Z" fill="${t.collar}"/>
        <circle cx="0" cy="-170" r="8" fill="${t.collar}" stroke="#e8d8e0" stroke-width="2"/>` : '';
      return `<path d="M -38 -195 L 38 -195 L 64 -58 Q 0 -40 -64 -58 Z" fill="${c}"/>
              <circle cx="0" cy="-140" r="4" fill="#fff" opacity="0.8"/>
              <circle cx="0" cy="-115" r="4" fill="#fff" opacity="0.8"/>
              ${collar}`;
    }
    case 'baroSaya': // Filipiniana: white butterfly-sleeve top + colored skirt
      return `<path d="M -38 -195 L 38 -195 L 44 -120 L -44 -120 Z" fill="#fffaf2"/>
              <path d="M -38 -195 Q -70 -200 -66 -168 Q -52 -160 -40 -172 Z" fill="#fffaf2"/>
              <path d="M 38 -195 Q 70 -200 66 -168 Q 52 -160 40 -172 Z" fill="#fffaf2"/>
              <path d="M -44 -122 L 44 -122 L 66 -52 Q 0 -36 -66 -52 Z" fill="${c}"/>
              <path d="M -60 -66 Q 0 -50 60 -66" stroke="#f2c94c" stroke-width="5" fill="none"/>`;
    case 'tshirt':
      return `<rect x="-46" y="-196" width="92" height="100" rx="20" fill="${c}"/>
              <path d="M -46 -186 L -76 -160 L -62 -138 L -44 -156 Z" fill="${c}"/>
              <path d="M 46 -186 L 76 -160 L 62 -138 L 44 -156 Z" fill="${c}"/>
              ${t.print || ''}`;
    case 'polo':
      return `<rect x="-46" y="-196" width="92" height="100" rx="20" fill="${c}"/>
              <path d="M -46 -186 L -76 -160 L -62 -138 L -44 -156 Z" fill="${c}"/>
              <path d="M 46 -186 L 76 -160 L 62 -138 L 44 -156 Z" fill="${c}"/>
              <path d="M -16 -196 L 0 -176 L -22 -168 Z" fill="#e8e8ee"/>
              <path d="M 16 -196 L 0 -176 L 22 -168 Z" fill="#e8e8ee"/>
              <circle cx="0" cy="-160" r="3.5" fill="#b8b8c4"/><circle cx="0" cy="-142" r="3.5" fill="#b8b8c4"/>`;
    case 'blouse':
      return `<rect x="-48" y="-196" width="96" height="102" rx="20" fill="${c}"/>
              <path d="M -48 -186 L -74 -158 L -60 -138 L -46 -156 Z" fill="${c}"/>
              <path d="M 48 -186 L 74 -158 L 60 -138 L 46 -156 Z" fill="${c}"/>
              <line x1="0" y1="-192" x2="0" y2="-96" stroke="#d8d8de" stroke-width="3"/>
              <path d="M -14 -196 L 0 -180 L -18 -172 Z" fill="#eeeef2"/>
              <path d="M 14 -196 L 0 -180 L 18 -172 Z" fill="#eeeef2"/>
              <circle cx="0" cy="-166" r="3" fill="#c8c8d0"/><circle cx="0" cy="-146" r="3" fill="#c8c8d0"/><circle cx="0" cy="-126" r="3" fill="#c8c8d0"/>`;
    case 'cami':
      return `<path d="M -40 -178 L 40 -178 L 44 -96 L -44 -96 Z" fill="${c}"/>
              <line x1="-34" y1="-178" x2="-24" y2="-196" stroke="${c}" stroke-width="7"/>
              <line x1="34" y1="-178" x2="24" y2="-196" stroke="${c}" stroke-width="7"/>`;
    case 'openShirt':
      return `<rect x="-30" y="-192" width="60" height="96" rx="12" fill="#f4f4f6"/>
              <path d="M -48 -196 L -18 -192 L -26 -94 L -50 -100 Z" fill="${c}"/>
              <path d="M 48 -196 L 18 -192 L 26 -94 L 50 -100 Z" fill="${c}"/>
              <path d="M -48 -186 L -78 -158 L -62 -136 L -46 -156 Z" fill="${c}"/>
              <path d="M 48 -186 L 78 -158 L 62 -136 L 46 -156 Z" fill="${c}"/>`;
    default: return `<rect x="-46" y="-196" width="92" height="100" rx="20" fill="${c}"/>`;
  }
}

function drawBottom(spec) {
  const isDress = ['dress', 'baroSaya'].includes(spec.top.type);
  if (isDress || !spec.bottom) return '';
  const b = spec.bottom, c = b.color;
  switch (b.type) {
    case 'shorts':
      return `<path d="M -44 -100 L 44 -100 L 46 -52 L 8 -52 L 0 -74 L -8 -52 L -46 -52 Z" fill="${c}"/>`;
    case 'pants':
      return `<path d="M -44 -100 L 44 -100 L 40 -12 L 10 -12 L 4 -72 L -4 -72 L -10 -12 L -40 -12 Z" fill="${c}"/>`;
    case 'skirt':
      return `<path d="M -44 -100 L 44 -100 L 56 -50 Q 0 -38 -56 -50 Z" fill="${c}"/>`;
    default: return '';
  }
}

function drawShoes(spec) {
  const s = spec.shoes, c = s.color;
  const socks = spec.socks

function buildCharacter(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1, facing = 1, idle = false, cls = '' } = opts;
  const { eyeX, eyeY, browY, blushX, blushY } = FACE;
  const earrings = spec.earrings
    ? `<circle cx="-58" cy="-226" r="5" fill="#f2c94c"/><circle cx="58" cy="-226" r="5" fill="#f2c94c"/>` : '';
  const bob = idle
    ? `<animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>` : '';
  return `
  <g class="${cls}" transform="translate(${x} ${y}) scale(${scale * facing} ${scale})">
    <g>${bob}
      ${hairBack(spec)}
      <!-- legs -->
      <rect x="-30" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      <rect x="10" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      ${drawShoes(spec)}
      ${drawBottom(spec)}
      ${drawArms(spec)}
      ${drawTop(spec)}
      <!-- neck + head -->
      <rect x="-12" y="-216" width="24" height="26" fill="${spec.skin}"/>
      <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
      ${hairFront(spec)}
      ${earrings}
      <!-- face -->
      <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <path d="M -${eyeX + 12} ${browY} Q -${eyeX} ${browY - 7} -${eyeX - 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M ${eyeX - 12} ${browY} Q ${eyeX} ${browY - 7} ${eyeX + 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      <ellipse cx="${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      ${drawMouth(spec)}
      ${drawGlasses(spec)}
      ${drawHat(spec)}
    </g>
  </g>`;
}

// Head-only portrait for house signboards.
function buildFace(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1 } = opts;
  const { eyeX, eyeY } = FACE;
  return `
  <g transform="translate(${x} ${y + 252 * scale}) scale(${scale})">
    ${hairBack(spec)}
    <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
    ${hairFront(spec)}
    <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <ellipse cx="-${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    <ellipse cx="${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    ${drawMouth(spec)}
    ${drawGlasses(spec)}
    ${drawHat(spec)}
  </g>`;
}

// Wave animation: rotate the right arm up and back a few times.
function waveCharacter(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(1200, t => {
    const a = -70 * Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t * 0.2);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

    <circle cx="380" cy="560" r="8"/><circle cx="1210" cy="480" r="8"/><circle cx="700" cy="820" r="8"/>
    <circle cx="960" cy="860" r="8" fill="#ffd94d"/><circle cx="240" cy="620" r="8" fill="#ffd94d"/>
    <circle cx="1440" cy="760" r="8" fill="#f47a5e"/>
  </g>`;

Scenes.map = {
  cancelWalk: null,
  enter() {
    Audio.music.start();
    const spawn = State.mapSpawn || { x: 800, y: 730 };

    stage.innerHTML = `
      <defs>
        <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#aee3f5"/><stop offset="1" stop-color="#dff5fd"/>
        </linearGradient>
      </defs>
      <rect id="mapGround0" width="1600" height="900" fill="url(#skyM)"/>
      <g class="deco" transform="translate(1340,118)">
        <g>${Array.from({ length: 12 }, (_, i) =>
          `<rect x="-7" y="-112" width="14" height="38" rx="7" fill="#ffd94d" transform="rotate(${i * 30})"/>`).join('')}
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/></g>
        <circle r="62" fill="#ffe066"/>
        <circle cx="-19" cy="-8" r="7" fill="#e8a13a"/><circle cx="19" cy="-8" r="7" fill="#e8a13a"/>
        <path d="M -20 16 Q 0 34 20 16" fill="none" stroke="#e8a13a" stroke-width="7" stroke-linecap="round"/>
      </g>
      <g fill="#fff" opacity="0.9">
        <g><ellipse cx="260" cy="110" rx="80" ry="36"/><ellipse cx="330" cy="94" rx="60" ry="30"/>
          <animateTransform attributeName="transform" type="translate" values="0 0;140 0;0 0" dur="36s" repeatCount="indefinite"/></g>
        <g><ellipse cx="760" cy="70" rx="66" ry="28"/>
          <animateTransform attributeName="transform" type="translate" values="0 0;-120 0;0 0" dur="44s" repeatCount="indefinite"/></g>
      </g>
      <rect id="mapGround" x="0" y="240" width="1600" height="660" fill="#9edb7a"/>
      <path d="M 0 240 Q 400 210 800 240 Q 1200 270 1600 240 L 1600 260 Q 1200 290 800 260 Q 400 230 0 260 Z" fill="#8bcf6b"/>
      <!-- road loop -->
      <path id="roadPath" d="M 250 460 Q 420 380 640 366 Q 835 352 1030 366 Q 1250 380 1390 460 Q 1420 540 1120 672 Q 820 740 520 672 Q 220 560 250 460 Z"
        fill="none" stroke="#e5cda2" stroke-width="86" stroke-linejoin="round"/>
      <path d="M 250 460 Q 420 380 640 366 Q 835 352 1030 366 Q 1250 380 1390 460 Q 1420 540 1120 672 Q 820 740 520 672 Q 220 560 250 460 Z"
        fill="none" stroke="#fffaf2" stroke-width="6" stroke-dasharray="26 30" opacity="0.8"/>
      ${MAP_DECOR}
      ${HOUSES.map(houseSVG).join('')}
      <g id="eyaWalk"></g>
      ${muteButtonSVG()}
    `;

    const eyaG = $('#eyaWalk');
    const pos = { x: spawn.x, y: spawn.y, facing: 1 };
    const depthScale = y => clamp(0.42 + (y - 300) / 900 * 0.55, 0.42, 0.78);
    // build once, move via transform
    eyaG.innerHTML = buildCharacter(effectiveEyaSpec(), {});
    const place = (bobY = 0) => {
      const s = depthScale(pos.y);
      eyaG.setAttribute('transform', `translate(${pos.x} ${pos.y + bobY}) scale(${s * pos.facing} ${s})`);
    };
    place();

    const walkTo = (tx, ty, done) => {
      if (Scenes.map.cancelWalk) Scenes.map.cancelWalk();
      ty = clamp(ty, 360, 860);
      const from = { x: pos.x, y: pos.y };
      const d = dist(from.x, from.y, tx, ty);
      if (d < 8) { if (done) done(); return; }
      pos.facing = tx < from.x ? -1 : 1;
      const ms = clamp(d / 0.45, 240, 2600);
      let lastStep = 0;
      Scenes.map.cancelWalk = tween(ms, t => {
        const e = easeInOut(t);
        pos.x = from.x + (tx - from.x) * e;
        pos.y = from.y + (ty - from.y) * e;
        const bob = -Math.abs(Math.sin(t * ms / 150)) * 10;
        if (t * ms - lastStep > 210) { lastStep = t * ms; Audio.sfx('step'); }
        place(bob);
      }, () => { Scenes.map.cancelWalk = null; place(); if (done) done(); });
    };

    // ground taps
    $('#mapGround').addEventListener('pointerdown', e => {
      if (App.locked) return;
      const p = toStage(e.clientX, e.clientY);
      walkTo(p.x, p.y);
    });

    // decorations wiggle
    stage.querySelectorAll('.deco').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const p = toStage(e.clientX, e.clientY);
        walkTo(clamp(p.x, 60, 1540), clamp(p.y + 60, 360, 860));
        Audio.sfx('pop');
        const base = el.getAttribute('transform') || '';
        tween(500, t => {
          el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI * 4) * 4})`);
        }, () => el.setAttribute('transform', base));
      });
    });

    // houses: walk to door, knock, "Tao po!", door opens, enter
    stage.querySelectorAll('.house').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const h = HOUSES.find(x => x.id === el.dataset.house);
        walkTo(h.x + 70, h.y + 34, () => {
          App.locked = true;
          Audio.sfx('knock');
          setTimeout(() => Audio.say('Tao po!'), 350);
          const door = el.querySelector('.door');
          setTimeout(() => {
            tween(450, t => {
              const k = Math.max(0.12, Math.cos(t * 1.35)); // swing around left hinge
              door.setAttribute('transform', `translate(-42 0) scale(${k} 1) translate(42 0)`);
            });
            Audio.sfx('chime');
          }, 1050);
          setTimeout(() => {
            State.mapSpawn = { x: h.x + 70, y: h.y + 34 };
            App.locked = false;
            App.go('house:' + h.id);
          }, 1700);
        });
      });
    });

    wireMuteButton();
  },
  exit() {
    if (Scenes.map.cancelWalk) Scenes.map.cancelWalk();
    Scenes.map.cancelWalk = null;
  }
};

// ---- House interior placeholder (real interiors in Task 5)
Scenes.house = {
  enter(houseId) {
    const h = HOUSES.find(x => x.id === houseId);
    stage.innerHTML = `
      <rect width="1600" height="900" fill="#f4e8d8"/>
      ${h.residents.map((r, i) =>
        buildCharacter(CHARACTERS[r], { x: 600 + i * 220, y: 700, scale: 0.9, idle: true })).join('')}
      <g id="homeBtn" style="cursor:pointer">
        <circle cx="90" cy="810" r="58" fill="#fff" opacity="0.9"/>
        <text x="90" y="834" text-anchor="middle" font-size="60">🏠</text>
      </g>
      ${muteButtonSVG()}
    `;
    $('#homeBtn').addEventListener('pointerdown', () => App.go('map'));
    wireMuteButton();
  },
  exit() {}
};

// ============================================================ ENGINE
const App = {
  root: stage,
  current: null,
  locked: false,           // guards double-navigation
  go(id) {
    if (App.locked) return;
    if (App.current && App.current.exit) App.current.exit();
    const [name, param] = id.split(':');
    App.current = Scenes[name];
    App.current.enter(param);
  }
};

// block context menu / long-press menus and pinch zoom
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

// #lineup and #map are debug entry points
App.go(location.hash === '#lineup' ? 'lineup' : location.hash === '#map' ? 'map' : 'title');
</script>
</body>
</html>
