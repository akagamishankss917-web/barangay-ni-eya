function toStage(clientX, clientY) {
  const pt = new DOMPoint(clientX, clientY);
  const m = stage.getScreenCTM();
  if (!m) return { x: 0, y: 0 };
  const p = pt.matrixTransform(m.inverse());
  return { x: p.x, y: p.y };
}

    if (cancelled) return;
    const t = clamp((now - t0) / ms, 0, 1);
    fn(t);
    if (t < 1) requestAnimationFrame(frame);
    else if (done) done();
  }
  requestAnimationFrame(frame);
  return () => { cancelled = true; };
}

// ============================================================ STATE
const State = {
  muted: false,
  outfit: null,            // filled by dress-up task
  lastCheeredOutfit: null,
  mapSpawn: null,          // where Eya stands when returning to map
};

// ============================================================ AUDIO
// Everything synthesized in WebAudio (no audio files); Taglish phrases via
// on-device speech synthesis. All guarded — silence is always acceptable.
const Audio = (() => {
  let ctx = null, master = null, musicGain = null, musicTimer = null;

  try { State.muted = localStorage.getItem('eya-muted') === '1'; } catch (e) {}

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = State.muted ? 0 : 1;
      master.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.09;
      musicGain.connect(master);
    } catch (e) { ctx = null; }
    return ctx;
  }

  // one short synthesized tone
  function tone({ freq = 440, dur = 0.15, type = 'sine', vol = 0.5, at = 0, slide = 0, out = null }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(out || master);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }

  function noise({ dur = 0.08, vol = 0.5, freq = 800, at = 0 }) {
    if (!ctx) return;
    const t0 = ctx.currentTime + at;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start(t0);
  }

  const SFX = {
    knock()   { noise({ dur: 0.09, vol: 0.9, freq: 320 }); noise({ dur: 0.09, vol: 0.9, freq: 300, at: 0.22 }); },
    pop()     { tone({ freq: 500, dur: 0.09, type: 'square', vol: 0.25, slide: 300 }); },
    sparkle() { [1200, 1600, 2100, 2700].forEach((f, i) => tone({ freq: f, dur: 0.12, vol: 0.22, at: i * 0.05 })); },
    boing()   { tone({ freq: 180, dur: 0.28, type: 'triangle', vol: 0.5, slide: 260 }); },
    chime()   { tone({ freq: 880, dur: 0.4, vol: 0.3 }); tone({ freq: 1320, dur: 0.5, vol: 0.2, at: 0.08 }); },
    step()    { noise({ dur: 0.04, vol: 0.25, freq: 700 }); },
    meow()    { tone({ freq: 700, dur: 0.35, type: 'sawtooth', vol: 0.12, slide: -280 }); },
    bounce()  { tone({ freq: 240, dur: 0.14, type: 'triangle', vol: 0.4, slide: -120 }); },
    fanfare() {
      [[523, 0], [659, 0.12], [784, 0.24], [1047, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.35, type: 'triangle', vol: 0.35, at }));
      [[523, 0.38], [659, 0.38], [784, 0.38]].forEach(([f, at]) =>
        tone({ freq: f, dur: 0.6, type: 'triangle', vol: 0.2, at }));
    },
  };

  // gentle plucked pentatonic lullaby-ish loop
  const SCALE = [392, 440, 523, 587, 659, 784];
  function scheduleBar() {
    if (!ctx || State.muted) return;
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.75) {
        tone({ freq: pick(SCALE), dur: 0.5, type: 'sine', vol: 0.5, at: i * 0.42, out: musicGain });
      }
      if (i === 0 && Math.random() < 0.5) {
        tone({ freq: pick(SCALE) / 2, dur: 0.9, type: 'triangle', vol: 0.25, at: 0, out: musicGain });
      }
    }
  }

  let voice = null, voiceLoaded = false;
  function pickVoice() {
    if (voiceLoaded) return;
    try {
      const vs = speechSynthesis.getVoices();
      if (!vs.length) return;
      voice = vs.find(v => /^(fil|tl)/i.test(v.lang)) || null;
      voiceLoaded = true;
    } catch (e) {}
  }
  try { speechSynthesis.addEventListener('voiceschanged', pickVoice); } catch (e) {}

  return {
    unlock() {
      const c = ensureCtx();
      try { if (c && c.state === 'suspended') c.resume(); } catch (e) {}
      try { speechSynthesis.resume(); } catch (e) {}
      pickVoice();
    },
    sfx(name) {
      if (State.muted || !ensureCtx()) return;
      try { SFX[name] && SFX[name](); } catch (e) {}
    },
    say(text) {
      if (State.muted) return;
      try {
        pickVoice();
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.pitch = 1.2; u.volume = 1;
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      } catch (e) {}
    },
    music: {
      start() {
        if (musicTimer || !ensureCtx()) return;
        scheduleBar();
        musicTimer = setInterval(scheduleBar, 1700);
      },
      stop() { clearInterval(musicTimer); musicTimer = null; },
    },
    setMuted(b) {
      State.muted = b;
      try { localStorage.setItem('eya-muted', b ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = b ? 0 : 1;
      if (b) { try { speechSynthesis.cancel(); } catch (e) {} }
    },
  };
})();

// Mute button helper — scenes render this and call wireMuteButton().
function muteButtonSVG() {
  return `<g id="muteBtn" style="cursor:pointer">
    <circle cx="1520" cy="80" r="52" fill="#ffffff" opacity="0.85"/>
    <text id="muteIcon" x="1520" y="102" text-anchor="middle" font-size="56">${State.muted ? '🔇' : '🔊'}</text>
  </g>`;
}
function wireMuteButton() {
  const btn = $('#muteBtn');
  if (!btn) return;
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    Audio.setMuted(!State.muted);
    $('#muteIcon').textContent = State.muted ? '🔇' : '🔊';
    if (!State.muted) Audio.sfx('pop');
  });
}

// ============================================================ ART — character rig
// Coordinate system per character: origin at center of feet, head top ≈ y=-330.
// Same face geometry for everyone; female full-hair styles overlay a hair ring
// with a skin "face window" so features sit at identical coordinates.

const FACE = { eyeY: -256, eyeX: 24, mouthY: -230, browY: -278, blushY: -238, blushX: 40 };

function hairBack(spec) {
  const hc = spec.hairColor;
  switch (spec.hair) {
    case 'pigtails':
      return `<circle cx="-80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="80" cy="-238" r="26" fill="${hc}"/>
              <circle cx="-80" cy="-260" r="7" fill="#ffb0c8"/>
              <circle cx="80" cy="-260" r="7" fill="#ffb0c8"/>`;
    case 'longStraight':
      return `<path d="M -70 -270 Q -78 -160 -64 -120 L -30 -130 L -40 -230 L 40 -230 L 30 -130 L 64 -120 Q 78 -160 70 -270 Z" fill="${hc}"/>`;
    case 'longWavy':
      return `<path d="M -70 -270 Q -84 -200 -70 -170 Q -80 -140 -62 -112 L -30 -128 L -40 -230 L 40 -230 L 30 -128 L 62 -112 Q 80 -140 70 -170 Q 84 -200 70 -270 Z" fill="${hc}"/>
              <circle cx="-64" cy="-118" r="14" fill="${hc}"/><circle cx="64" cy="-118" r="14" fill="${hc}"/>`;
    case 'shoulderBob':
      return `<path d="M -72 -270 Q -80 -190 -62 -168 Q -30 -152 0 -152 Q 30 -152 62 -168 Q 80 -190 72 -270 Z" fill="${hc}"/>`;
    case 'ponytail':
      return `<circle cx="62" cy="-300" r="20" fill="${hc}"/>
              <path d="M 62 -300 Q 92 -260 78 -190 Q 70 -168 60 -186 Q 70 -250 52 -290 Z" fill="${hc}"/>
              <circle cx="58" cy="-296" r="7" fill="#e8b13a"/>`;
    default: return '';
  }
}

function hairFront(spec) {
  const hc = spec.hairColor;
  const fullHair = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'].includes(spec.hair);
  if (fullHair) {
    // hair ring + face window (fringe all around)
    return `<circle cx="0" cy="-258" r="71" fill="${hc}"/>
            <ellipse cx="0" cy="-244" rx="54" ry="50" fill="${spec.skin}"/>`;
  }
  switch (spec.hair) {
    case 'shortSpiky':
      return `<path d="M -64 -268 A 66 66 0 0 1 64 -268 L 62 -256 Q 44 -270 40 -262 Q 20 -278 12 -266 Q -6 -280 -16 -266 Q -36 -276 -44 -262 Q -58 -268 -62 -254 Z" fill="${hc}"/>
              <path d="M -50 -308 L -40 -326 L -32 -308 Z" fill="${hc}"/>
              <path d="M -18 -316 L -8 -334 L 0 -314 Z" fill="${hc}"/>
              <path d="M 14 -316 L 24 -332 L 32 -312 Z" fill="${hc}"/>
              <path d="M 42 -306 L 52 -320 L 58 -302 Z" fill="${hc}"/>`;
    case 'shortNeat':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -252 Q 30 -272 -10 -268 Q -46 -264 -64 -248 Z" fill="${hc}"/>`;
    case 'swept':
      return `<path d="M -65 -262 A 66 66 0 0 1 65 -262 L 64 -240 Q 56 -262 34 -266 Q 54 -280 30 -290 Q -6 -302 -38 -288 Q -62 -276 -64 -246 Z" fill="${hc}"/>
              <path d="M -60 -282 Q -20 -306 24 -294 Q 44 -288 50 -276 Q 20 -290 -16 -284 Q -44 -278 -58 -266 Z" fill="${hc}"/>`;
    default: return '';
  }
}

function drawGlasses(spec) {
  if (!spec.glasses) return '';
  const { eyeX, eyeY } = FACE;
  if (spec.glasses === 'round')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <circle cx="-${eyeX}" cy="${eyeY}" r="19"/><circle cx="${eyeX}" cy="${eyeY}" r="19"/>
      <line x1="-5" y1="${eyeY - 4}" x2="5" y2="${eyeY - 4}"/></g>`;
  if (spec.glasses === 'rect')
    return `<g stroke="#5a4632" stroke-width="5" fill="none">
      <rect x="-${eyeX + 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <rect x="${eyeX - 20}" y="${eyeY - 16}" width="40" height="32" rx="10"/>
      <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}"/></g>`;
  // sun
  return `<g><rect x="-${eyeX + 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <rect x="${eyeX - 21}" y="${eyeY - 15}" width="42" height="30" rx="12" fill="#2c2c34"/>
    <line x1="-4" y1="${eyeY - 6}" x2="4" y2="${eyeY - 6}" stroke="#2c2c34" stroke-width="5"/>
    <circle cx="-${eyeX + 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/><circle cx="${eyeX - 8}" cy="${eyeY - 6}" r="4" fill="#6a6a78"/></g>`;
}

function drawMouth(spec) {
  const y = FACE.mouthY;

let _faceUid = 0;
const FULL_HAIR = ['pigtails', 'longStraight', 'longWavy', 'shoulderBob', 'ponytail'];

// Photo face: the real face clipped into the head, cartoon hair around it.
// Full-hair styles: hair ring first, photo fills the face window.
// Short-hair styles: photo first, fringe overlaps the forehead edge.
function photoFaceLayer(spec) {
  const photo = FACES[spec.face];
  const uid = ++_faceUid;
  const full = FULL_HAIR.includes(spec.hair);
  // Short-hair crops already show the person's real hair, so no cartoon fringe:
  // the photo just fills (almost) the whole head circle.
  const e = full ? { cy: -244, rx: 54, ry: 50 } : { cy: -251, rx: 58, ry: 63 };
  const img = `
      <clipPath id="fclip${uid}"><ellipse cx="0" cy="${e.cy}" rx="${e.rx}" ry="${e.ry}"/></clipPath>
      <image href="${photo}" xlink:href="${photo}" x="${-e.rx - 4}" y="${e.cy - e.ry - 4}"
        width="${e.rx * 2 + 8}" height="${e.ry * 2 + 8}"
        preserveAspectRatio="xMidYMid slice" clip-path="url(#fclip${uid})"/>`;
  return full ? hairFront(spec) + img : img;
}

function cartoonFaceLayer(spec) {
  const { eyeX, eyeY, browY, blushX, blushY } = FACE;
  return `
      ${hairFront(spec)}
      <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
      <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
      <path d="M -${eyeX + 12} ${browY} Q -${eyeX} ${browY - 7} -${eyeX - 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M ${eyeX - 12} ${browY} Q ${eyeX} ${browY - 7} ${eyeX + 12} ${browY}" stroke="${spec.hairColor}" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      <ellipse cx="${blushX}" cy="${blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
      ${drawMouth(spec)}
      ${drawGlasses(spec)}`;
}

function buildCharacter(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1, facing = 1, idle = false, cls = '' } = opts;
  const earrings = spec.earrings
    ? `<circle cx="-58" cy="-226" r="5" fill="#f2c94c"/><circle cx="58" cy="-226" r="5" fill="#f2c94c"/>` : '';
  const bob = idle
    ? `<animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>` : '';
  const face = FACES[spec.face] ? photoFaceLayer(spec) : cartoonFaceLayer(spec);
  return `
  <g class="${cls}" transform="translate(${x} ${y}) scale(${scale * facing} ${scale})">
    <g>${bob}
      ${hairBack(spec)}
      <!-- legs -->
      <rect x="-30" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      <rect x="10" y="-60" width="20" height="46" rx="9" fill="${spec.skin}"/>
      ${drawShoes(spec)}
      ${drawBottom(spec)}
      ${drawArms(spec)}
      ${drawTop(spec)}
      <!-- neck + head -->
      <rect x="-12" y="-216" width="24" height="26" fill="${spec.skin}"/>
      <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
      ${face}
      ${earrings}
      ${drawHat(spec)}
    </g>
  </g>`;
}

// Head-only portrait for house signboards.
function buildFace(spec, opts = {}) {
  const { x = 0, y = 0, scale = 1 } = opts;
  const { eyeX, eyeY } = FACE;
  const photo = FACES[spec.face];
  if (photo) {
    const uid = ++_faceUid;
    return `
  <g transform="translate(${x} ${y}) scale(${scale})">
    <circle r="72" fill="#fff" stroke="#e0d0b8" stroke-width="6"/>
    <clipPath id="pclip${uid}"><circle r="66"/></clipPath>
    <image href="${photo}" xlink:href="${photo}" x="-66" y="-66" width="132" height="132"
      preserveAspectRatio="xMidYMid slice" clip-path="url(#pclip${uid})"/>
  </g>`;
  }
  return `
  <g transform="translate(${x} ${y + 252 * scale}) scale(${scale})">
    ${hairBack(spec)}
    <circle cx="0" cy="-252" r="66" fill="${spec.skin}"/>
    ${hairFront(spec)}
    <circle cx="-${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="${eyeX}" cy="${eyeY}" r="7.5" fill="#241812"/>
    <circle cx="-${eyeX - 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <circle cx="${eyeX + 2.5}" cy="${eyeY - 2.5}" r="2.5" fill="#fff"/>
    <ellipse cx="-${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    <ellipse cx="${FACE.blushX}" cy="${FACE.blushY}" rx="10" ry="6" fill="#ff9eb0" opacity="0.45"/>
    ${drawMouth(spec)}
    ${drawGlasses(spec)}
    ${drawHat(spec)}
  </g>`;
}

// Wave animation: rotate the right arm up and back a few times.
function waveCharacter(gEl) {
  const arm = gEl.querySelector('.armR');
  if (!arm) return;
  tween(1200, t => {
    const a = -70 * Math.abs(Math.sin(t * Math.PI * 3)) * (1 - t * 0.2);
    arm.setAttribute('transform', `rotate(${a} 50 -180)`);
  }, () => arm.setAttribute('transform', ''));
}

        fill="none" stroke="#fffaf2" stroke-width="6" stroke-dasharray="26 30" opacity="0.8"/>
      ${MAP_DECOR}
      ${HOUSES.map(houseSVG).join('')}
      <g id="eyaWalk"></g>
      ${muteButtonSVG()}
    `;

    const eyaG = $('#eyaWalk');
    const pos = { x: spawn.x, y: spawn.y, facing: 1 };
    const depthScale = y => clamp(0.42 + (y - 300) / 900 * 0.55, 0.42, 0.78);
    // build once, move via transform
    eyaG.innerHTML = buildCharacter(effectiveEyaSpec(), {});
    const place = (bobY = 0) => {
      const s = depthScale(pos.y);
      eyaG.setAttribute('transform', `translate(${pos.x} ${pos.y + bobY}) scale(${s * pos.facing} ${s})`);
    };
    place();

    const walkTo = (tx, ty, done) => {
      if (Scenes.map.cancelWalk) Scenes.map.cancelWalk();
      ty = clamp(ty, 360, 860);
      const from = { x: pos.x, y: pos.y };
      const d = dist(from.x, from.y, tx, ty);
      if (d < 8) { if (done) done(); return; }
      pos.facing = tx < from.x ? -1 : 1;
      const ms = clamp(d / 0.45, 240, 2600);
      let lastStep = 0;
      Scenes.map.cancelWalk = tween(ms, t => {
        const e = easeInOut(t);
        pos.x = from.x + (tx - from.x) * e;
        pos.y = from.y + (ty - from.y) * e;
        const bob = -Math.abs(Math.sin(t * ms / 150)) * 10;
        if (t * ms - lastStep > 210) { lastStep = t * ms; Audio.sfx('step'); }
        place(bob);
      }, () => { Scenes.map.cancelWalk = null; place(); if (done) done(); });
    };

    // ground taps
    $('#mapGround').addEventListener('pointerdown', e => {
      if (App.locked) return;
      const p = toStage(e.clientX, e.clientY);
      walkTo(p.x, p.y);
    });

    // decorations wiggle
    stage.querySelectorAll('.deco').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const p = toStage(e.clientX, e.clientY);
        walkTo(clamp(p.x, 60, 1540), clamp(p.y + 60, 360, 860));
        Audio.sfx('pop');
        const base = el.getAttribute('transform') || '';
        tween(500, t => {
          el.setAttribute('transform', `${base} rotate(${Math.sin(t * Math.PI * 4) * 4})`);
        }, () => el.setAttribute('transform', base));
      });
    });

    // houses: walk to door, knock, "Tao po!", door opens, enter
    stage.querySelectorAll('.house').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        if (App.locked) return;
        const h = HOUSES.find(x => x.id === el.dataset.house);
        walkTo(h.x + 70, h.y + 34, () => {
          App.locked = true;
          Audio.sfx('knock');
          setTimeout(() => Audio.say('Tao po!'), 350);
          const door = el.querySelector('.door');
          setTimeout(() => {
            tween(450, t => {
              const k = Math.max(0.12, Math.cos(t * 1.35)); // swing around left hinge
              door.setAttribute('transform', `translate(-42 0) scale(${k} 1) translate(42 0)`);
            });
            Audio.sfx('chime');
          }, 1050);
          setTimeout(() => {
            State.mapSpawn = { x: h.x + 70, y: h.y + 34 };
            App.locked = false;
            App.go('house:' + h.id);
          }, 1700);
        });
      });
    });

    wireMuteButton();
  },
  exit() {
    if (Scenes.map.cancelWalk) Scenes.map.cancelWalk();
    Scenes.map.cancelWalk = null;
  }
};

function lighten(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const L = v => Math.round(v + (255 - v) * f);
  return `rgb(${L(n >> 16 & 255)},${L(n >> 8 & 255)},${L(n & 255)})`;
}

// ---- drag with springy wobble
function getXY(el) { return { x: +el.dataset.x, y: +el.dataset.y }; }
function setXY(el, x, y) {
  el.dataset.x = x; el.dataset.y = y;
  el.setAttribute('transform', `translate(${x} ${y}) scale(${el.dataset.s || 1})`);
}
function wobble(el) {
  const s = +(el.dataset.s || 1);
  tween(420, t => {
    const k = 1 + Math.sin(t * Math.PI * 3) * 0.14 * (1 - t);
    el.setAttribute('transform', `translate(${el.dataset.x} ${el.dataset.y}) scale(${s * k} ${s * (2 - k > 0 ? 2 - k : 1)})`);
  }, () => setXY(el, +el.dataset.x, +el.dataset.y));
}
function makeDraggable(el, opts = {}) {
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const start = toStage(e.clientX, e.clientY);
    const base = getXY(el);
    const off = { x: base.x - start.x, y: base.y - start.y };
    el.parentNode.appendChild(el); // raise to front
    Audio.sfx('pop');
    let moved = false;
    const move = ev => {
      const p = toStage(ev.clientX, ev.clientY);
      moved = true;
      setXY(el, clamp(p.x + off.x, 50, 1550), clamp(p.y + off.y, 140, 870));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
      wobble(el);
      if (moved) Audio.sfx(opts.dropSfx || 'boing');
      if (opts.onDrop) opts.onDrop(+el.dataset.x, +el.dataset.y, el);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

function confettiBurst(x, y) {
  const fx = $('#fxLayer');
  if (!fx) return;
  const colors = ['#ff8fb5', '#ffd94d', '#8ecae6', '#9edb7a', '#f47a5e', '#c9a0f0'];
  const bits = Array.from({ length: 40 }, () => ({
    x: x + rand(-40, 40), y: y + rand(-30, 10),
    vx: rand(-260, 260), vy: rand(-520, -180),
    rot: rand(0, 360), vr: rand(-500, 500), c: pick(colors), w: rand(10, 20),
  }));
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  fx.appendChild(g);
  tween(1400, t => {
    const s = t * 1.4;
    g.innerHTML = bits.map(b => {
      const bx = b.x + b.vx * s, by = b.y + b.vy * s + 420 * s * s;
      return `<rect x="-8" y="-5" width="${b.w}" height="10" rx="3" fill="${b.c}"
        transform="translate(${bx} ${by}) rotate(${b.rot + b.vr * s})" opacity="${1 - t * 0.7}"/>`;
    }).join('');
  }, () => g.remove());
}

      ${Array.from({ length: 5 }, (_, i) => `<line x1="0" y1="${660 + i * 50}" x2="1600" y2="${660 + i * 50}" stroke="#c9a276" stroke-width="3"/>`).join('')}
      <rect y="590" width="1600" height="18" fill="${wallDark}"/>
      <ellipse cx="800" cy="770" rx="330" ry="90" fill="${lighten(h.color, 0.42)}"/>
      <ellipse cx="800" cy="770" rx="250" ry="64" fill="${lighten(h.color, 0.52)}"/>
      <!-- window with palm view -->
      <g transform="translate(420 300)">
        <rect x="-130" y="-110" width="260" height="220" rx="16" fill="#fffaf2"/>
        <rect x="-114" y="-94" width="228" height="188" rx="10" fill="#aee3f5"/>
        <circle cx="70" cy="-40" r="24" fill="#ffe066"/>
        <path d="M -60 94 Q -58 30 -50 6 Q -80 -10 -96 8 Q -70 6 -56 26 Q -40 -12 -16 -2 Q -46 6 -52 30 L -44 94 Z" fill="#4ca858"/>
        <line x1="0" y1="-94" x2="0" y2="94" stroke="#fffaf2" stroke-width="10"/>
        <line x1="-114" y1="0" x2="114" y2="0" stroke="#fffaf2" stroke-width="10"/>
        <path d="M -130 -110 Q -150 0 -130 110 L -118 110 Q -134 0 -118 -110 Z" fill="#f6d8b8"/>
        <path d="M 130 -110 Q 150 0 130 110 L 118 110 Q 134 0 118 -110 Z" fill="#f6d8b8"/>
      </g>
      <!-- framed family heart -->
      <g transform="translate(1100 260)">
        <rect x="-64" y="-78" width="128" height="156" rx="10" fill="#c9a06a"/>
        <rect x="-52" y="-66" width="104" height="132" rx="6" fill="#fffaf2"/>
        <path d="M 0 34 C -44 2 -34 -40 -8 -30 Q 0 -26 0 -18 Q 0 -26 8 -30 C 34 -40 44 2 0 34 Z" fill="#ff8fb5"/>
      </g>
      <g id="propLayer"></g>
      <g id="residentLayer"></g>
      <g id="fxLayer"></g>
      <g id="homeBtn" style="cursor:pointer">
        <circle cx="92" cy="806" r="58" fill="#fff" opacity="0.9"/>
        <text x="92" y="830" text-anchor="middle" font-size="58">🏠</text>
      </g>
      ${muteButtonSVG()}
    `;

    // residents + Eya
    const rl = $('#residentLayer');
    const residentPos = {};
    let rHtml = '';
    h.residents.filter(r => r !== 'eya').forEach((r, i) => {
      residentPos[r] = { x: 1040 - i * 190, y: 760 };
      rHtml += `<g class="resident" data-key="${r}" style="cursor:pointer">${
        buildCharacter(CHARACTERS[r], { x: 1040 - i * 190, y: 760, scale: 0.72, idle: true, facing: -1 })
      }</g>`;
    });
    rHtml += `<g class="resident" data-key="eya">${
      buildCharacter(effectiveEyaSpec(), { x: 250, y: 830, scale: 0.66, idle: true })
    }</g>`;
    rl.innerHTML = rHtml;

    rl.querySelectorAll('.resident').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        waveCharacter(el);
        Audio.sfx('chime');
        Audio.say(CHARACTERS[el.dataset.key].label);
      });
    });
    // welcome wave from the host — and a compliment if Eya changed her outfit
    const host = rl.querySelector('.resident');
    if (host) setTimeout(() => waveCharacter(host), 400);
    const outfitNow = JSON.stringify(State.outfit);
    if (State.lastCheeredOutfit && State.lastCheeredOutfit !== outfitNow) {
      setTimeout(() => { Audio.say('Ang ganda mo, Eya!'); Audio.sfx('sparkle'); }, 900);
    }
    State.lastCheeredOutfit = outfitNow;

    // props
    const pl = $('#propLayer');
    pl.innerHTML = props.map(p => `
      ${p.table ? `<g transform="translate(${p.x} ${p.y + 24})">
        <rect x="-110" y="-14" width="220" height="20" rx="8" fill="#a87c4a"/>
        <rect x="-92" y="6" width="16" height="86" fill="#8a6242"/>
        <rect x="76" y="6" width="16" height="86" fill="#8a6242"/></g>` : ''}
      <g class="prop" data-id="${p.id}" data-x="${p.x}" data-y="${p.y}" data-s="${p.s}"
         transform="translate(${p.x} ${p.y}) scale(${p.s})" style="cursor:pointer">${propArt(p)}</g>
    `).join('');

    props.forEach(p => {
      const el = pl.querySelector(`.prop[data-id="${p.id}"]`);
      switch (p.kind) {
        case 'drag':
          makeDraggable(el, { dropSfx: p.dropSfx, onDrop: (x, y) => Scenes.house.onPropDrop(h, p, x, y, el) });
          break;
        case 'wardrobe':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            if (App.locked) return;
            Audio.sfx('sparkle');
            App.go('dressup');
          });
          break;
        case 'tap':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            Audio.sfx(p.sfx || 'pop');
            const s = p.s;
            if (p.anim === 'rock') {
              tween(900, t => el.setAttribute('transform',
                `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 4) * 12})`),
                () => setXY(el, p.x, p.y));
            } else if (p.anim === 'pulse' || p.anim === 'squeeze') {
              tween(500, t => {
                const k = 1 + Math.sin(t * Math.PI * 2) * 0.12;
                el.setAttribute('transform', `translate(${p.x} ${p.y}) scale(${s * k} ${s / k})`);
              }, () => setXY(el, p.x, p.y));
            } else if (p.anim === 'wiggle') {
              tween(500, t => el.setAttribute('transform',
                `translate(${p.x} ${p.y}) scale(${s}) rotate(${Math.sin(t * Math.PI * 6) * 4})`),
                () => setXY(el, p.x, p.y));
            } else if (p.anim === 'sheen') {
              const sheen = el.querySelector('.sheen');
              tween(600, t => sheen && sheen.setAttribute('transform', `translate(${-60 + t * 120} 0)`));
            }
          });
          break;
        case 'water':
          makeDraggable(el, {
            onDrop: (x, y) => {
              props.filter(q => q.kind === 'pot').forEach(q => {
                const potEl = pl.querySelector(`.prop[data-id="${q.id}"]`);
                if (potEl && dist(x, y, +potEl.dataset.x, +potEl.dataset.y) < 150) {
                  const fl = potEl.querySelector('.flower');
                  if (fl && !potEl.dataset.bloomed) {
                    potEl.dataset.bloomed = '1';
                    Audio.sfx('sparkle');
                    tween(700, t => fl.setAttribute('transform', `scale(${easeInOut(t)})`));
                  }
                }
              });
            }
          });
          break;
        case 'pot': break; // static target
        case 'peek':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            Audio.sfx('pop');
            const fx = $('#fxLayer');
            fx.innerHTML = `
              <defs><mask id="peekMask">
                <rect width="1600" height="900" fill="white"/>
                <circle cx="710" cy="440" r="180" fill="black"/>
                <circle cx="930" cy="440" r="180" fill="black"/>
              </mask></defs>
              <rect width="1600" height="900" fill="#1a1a22" mask="url(#peekMask)" opacity="0.93"/>`;
            setTimeout(() => { fx.innerHTML = ''; Audio.sfx('chime'); }, 1600);
          });
          break;
        case 'umbrella':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            Audio.sfx('boing');
            const open = el.querySelector('.umb-open'), closed = el.querySelector('.umb-closed');
            const isOpen = open.style.display !== 'none';
            open.style.display = isOpen ? 'none' : '';
            closed.style.display = isOpen ? '' : 'none';
            wobble(el);
          });
          break;
        case 'flash':
          el.addEventListener('pointerdown', e => {
            e.stopPropagation();
            Audio.sfx('chime');
            const fx = $('#fxLayer');
            fx.innerHTML = `<rect width="1600" height="900" fill="#fff"/>`;
            setTimeout(() => { fx.innerHTML = ''; }, 180);
          });
          break;
      }
    });

    // ---- tiny optional wish (thought bubble)
    this.taskState = null;
    const task = HOUSE_TASKS[h.id];
    const taskProp = task && props.find(p => p.id === task.propId);
    const tp = task && residentPos[task.target];
    if (task && taskProp && tp) {
      const bx = tp.x + 30, by = tp.y - 320; // above the resident's head
      const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      bubble.setAttribute('id', 'wishBubble');
      bubble.innerHTML = `
        <g transform="translate(${bx} ${by})">
          <circle cx="-72" cy="76" r="10" fill="#fff" opacity="0.95"/>
          <circle cx="-54" cy="56" r="16" fill="#fff" opacity="0.95"/>
          <ellipse cx="0" cy="0" rx="92" ry="70" fill="#fff" opacity="0.97"/>
          <ellipse cx="-58" cy="-22" rx="42" ry="34" fill="#fff" opacity="0.97"/>
          <ellipse cx="56" cy="-20" rx="44" ry="36" fill="#fff" opacity="0.97"/>
          <g transform="scale(0.55) translate(0 10)">${propArt(taskProp)}</g>
          <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="2.6s" repeatCount="indefinite" additive="sum"/>
        </g>`;
      $('#fxLayer').before(bubble);
      this.taskState = { ...task, tp, done: false };
    }

    $('#homeBtn').addEventListener('pointerdown', e => {
      e.stopPropagation();
      App.go('map');
    });
    wireMuteButton();
  },
  onPropDrop(h, p, x, y, el) {
    const ts = this.taskState;
    if (!ts || ts.done || p.id !== ts.propId) return;
    if (dist(x, y, ts.tp.x, ts.tp.y - 110) > 190) return;
    ts.done = true;
    const bubble = $('#wishBubble');
    if (bubble) {
      Audio.sfx('sparkle');
      tween(300, t => bubble.setAttribute('opacity', 1 - t), () => bubble.remove());
    }
    Audio.sfx('fanfare');
    confettiBurst(ts.tp.x, ts.tp.y - 260);
    const target = stage.querySelector(`.resident[data-key="${ts.target}"]`);
    if (target) { waveCharacter(target); setTimeout(() => waveCharacter(target), 1300); }
    setTimeout(() => Audio.say(CHEER), 500);
  },
  exit() {}
};

// ============================================================ DRESS-UP
Scenes.dressup = {
  cat: 'top',
  enter() {
    this.cat = 'top';
    stage.innerHTML = `
      <defs>
        <linearGradient id="duBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fde8f0"/><stop offset="1" stop-color="#f6d8ec"/>
        </linearGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#duBg)"/>
      <circle cx="820" cy="430" r="300" fill="#fff" opacity="0.5"/>
      <g fill="#ff8fb5" opacity="0.6">
        <path d="M 320 120 C 300 100 270 110 275 135 C 260 120 235 135 245 155 Q 275 175 320 150 Z" transform="scale(0.9)"/>
        <circle cx="1300" cy="150" r="10"/><circle cx="1350" cy="110" r="7"/><circle cx="260" cy="640" r="9"/>
        <circle cx="480" cy="130" r="8" fill="#ffd94d"/><circle cx="1240" cy="620" r="8" fill="#ffd94d"/>
      </g>
      <text x="800" y="90" text-anchor="middle" font-size="56" font-weight="bold" fill="#e8709c"
        font-family="'Comic Sans MS',cursive" stroke="#fff" stroke-width="3" paint-order="stroke">Bihis Tayo!</text>
      <g id="duEya"></g>
      <g id="duTabs"></g>
      <g id="duItems"></g>
      <g id="backBtn" style="cursor:pointer">
        <circle cx="92" cy="94" r="58" fill="#fff" opacity="0.9"/>
        <path d="M 118 94 L 74 94 M 92 72 L 70 94 L 92 116" stroke="#e8709c" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      ${muteButtonSVG()}
    `;
    this.renderEya();
    this.renderTabs();
    this.renderItems();
    $('#backBtn').addEventListener('pointerdown', () => App.go('house:eya'));
    wireMuteButton();
  },
  renderEya() {
    $('#duEya').innerHTML = buildCharacter(effectiveEyaSpec(), { x: 820, y: 660, scale: 1.35, idle: true });
  },
  renderTabs() {
    const tabs = [
      { cat: 'top', icon: WARDROBE.top[0].icon },
      { cat: 'hat', icon: WARDROBE.hat[0].icon },
      { cat: 'shoes', icon: WARDROBE.shoes[0].icon },
    ];
    $('#duTabs').innerHTML = tabs.map((t, i) => `
      <g class="duTab" data-cat="${t.cat}" style="cursor:pointer" transform="translate(160 ${260 + i * 190})">
        <circle r="76" fill="${this.cat === t.cat ? '#ffd7e6' : '#fff'}"
          stroke="${this.cat === t.cat ? '#e8709c' : '#e8d0dc'}" stroke-width="7"/>
        <g transform="scale(1.5)">${t.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duTab').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        this.cat = el.dataset.cat;
        Audio.sfx('pop');
        this.renderTabs();
        this.renderItems();
      });
    });
  },
  renderItems() {
    const items = WARDROBE[this.cat];
    const startX = 800 - (items.length - 1) * 95;
    $('#duItems').innerHTML = items.map((it, i) => `
      <g class="duItem" data-id="${it.id}" style="cursor:pointer" transform="translate(${startX + i * 190} 790)">
        <circle r="80" fill="${State.outfit[this.cat] === it.id ? '#ffd7e6' : '#fff'}"
          stroke="${State.outfit[this.cat] === it.id ? '#e8709c' : '#e8d0dc'}" stroke-width="7"/>
        <g transform="scale(1.6)">${it.icon}</g>
      </g>`).join('');
    stage.querySelectorAll('.duItem').forEach(el => {
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        State.outfit[this.cat] = el.dataset.id;
        State.saveOutfit();
        Audio.sfx('sparkle');
        this.renderEya();
        this.renderItems();
      });
    });
  },
  exit() {}
};

// ============================================================ ENGINE
const App = {
  root: stage,
  current: null,
  locked: false,           // guards mid-sequence navigation (door opening)
  _lastGo: 0,
  go(id) {
    if (App.locked) return;
    const now = performance.now();
    if (App.current && now - App._lastGo < 350) return; // toddler double-tap guard (never blocks the first scene)
    App._lastGo = now;
    if (App.current && App.current.exit) App.current.exit();
    const [name, param] = id.split(':');
    App.current = Scenes[name];
    App.current.enter(param);
  }
};

// block context menu / long-press menus and pinch zoom
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

State.loadOutfit();
State.lastCheeredOutfit = JSON.stringify(State.outfit);

// offline support (no-op on file:// or unsupported browsers)
try {
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js');
  }
} catch (e) {}

// iOS restores suspended pages instead of reloading — recover cleanly.
window.addEventListener('pageshow', e => {
  if (e.persisted) location.reload();
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    Audio.unlock();
    try { speechSynthesis.cancel(); } catch (e) {}
  }
});

// #lineup, #map, #house-<id>, #dressup are debug entry points
const dbg = location.hash.slice(1);
App.go(dbg === 'lineup' ? 'lineup'
  : dbg === 'map' ? 'map'
  : dbg === 'dressup' ? 'dressup'
  : dbg.startsWith('house-') ? 'house:' + dbg.slice(6)
  : 'title');
</script>
</body>
